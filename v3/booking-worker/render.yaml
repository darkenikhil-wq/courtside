services:
  - type: web
    name: courtside-booking-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: HEADLESS
        value: true
      - key: DRY_RUN
        value: false
      - key: PLAYWRIGHT_ARTIFACT_DIR
        value: /tmp/courtside-playwright
      - key: RESERVE_JOB_STORE_DIR
        value: /tmp/courtside-reserve-jobs
      - key: PLAYWRIGHT_CONNECT_MODE
        value: cdp
      - key: PLAYWRIGHT_CONNECT_TIMEOUT_MS
        value: 60000
      - key: BROWSERLESS_TIMEOUT_MS
        value: 300000
      - key: WEBTRAC_CLEAR_CART_BEFORE_RESERVE
        value: true
      - key: ALLOW_WEBTRAC_FINAL_PAYMENT
        value: false
      - key: BOOKING_WORKER_TOKEN
        sync: false
      - key: WEBTRAC_USERNAME
        sync: false
      - key: WEBTRAC_PASSWORD
        sync: false
      - key: PLAYWRIGHT_WS_ENDPOINT
        sync: false
      - key: BROWSERLESS_TOKEN
        sync: false
      - key: BROWSERLESS_REGION
        value: sfo
      - key: BROWSERLESS_ROUTE
        value: stealth
      - key: BROWSERLESS_STEALTH
        value: true
      - key: BROWSERLESS_PROXY
        value: residential
      - key: BROWSERLESS_PROXY_COUNTRY
        value: us
      - key: BROWSERLESS_PROXY_STICKY
        value: true
      - key: BROWSERLESS_PROXY_PRESET
        value: px_gov01
      - key: WEBTRAC_BILL_FIRST_NAME
        sync: false
      - key: WEBTRAC_BILL_LAST_NAME
        sync: false
      - key: WEBTRAC_BILL_PHONE
        sync: false
      - key: WEBTRAC_BILL_EMAIL
        sync: false
      - key: WEBTRAC_CARD_NAME
        sync: false
      - key: WEBTRAC_BILL_ADDRESS1
        sync: false
      - key: WEBTRAC_BILL_POSTAL_CODE
        sync: false
      - key: WEBTRAC_CARD_NUMBER
        sync: false
      - key: WEBTRAC_CARD_EXP
        sync: false
      - key: WEBTRAC_CARD_CVC
        sync: false
