</script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --accent: #22D3EE;             /* electric cyan */
      --accent-deep: #06B6D4;
      --accent-rgb: 34, 211, 238;
      --bg: #0A0F16;                 /* near-black with cool tint */
      --bg-tint: #131B25;
      --card: #161F2B;
      --card-elev: #1D2735;          /* slightly raised surface */
      --ink: #F1F5F9;
      --muted: #8B96A8;
      --line: rgba(255, 255, 255, 0.08);
      --error: #F87171;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(var(--accent-rgb), 0.10) 0%, transparent 70%),
        var(--bg);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .main {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .app-footer {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    .app-footer a {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 4px;
      transition: color 0.15s;
    }
    .app-footer a:hover { color: var(--accent); }
    .app-footer a svg { width: 13px; height: 13px; }
    .app-footer .dot { margin: 0 4px; opacity: 0.5; }

    .card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 48px 40px 40px;
      text-align: center;
      max-width: 460px;
      width: 100%;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.04) inset,
        0 20px 60px -20px rgba(0, 0, 0, 0.5);
    }

    .back-link {
      position: absolute;
      top: 18px;
      left: 22px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 8px;
      margin: 0;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }
    .back-link:hover { color: var(--accent); background: rgba(var(--accent-rgb), 0.06); }

    /* Post-booking CTA list */
    .cta-list { display: grid; gap: 10px; margin-top: 8px; }
    .cta {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--card-elev);
      border: 1px solid var(--line);
      border-radius: 14px;
      text-decoration: none;
      color: var(--ink);
      font-weight: 500;
      transition: border-color 0.15s, transform 0.05s;
    }
    .cta:hover { border-color: rgba(var(--accent-rgb), 0.50); }
    .cta:active { transform: scale(0.99); }
    .cta-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .cta-icon svg { width: 100%; height: 100%; }
    .cta-label {
      flex: 1;
      text-align: left;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.005em;
    }
    .cta-arrow { color: var(--accent); font-size: 18px; }
    .cta-divider {
      margin: 24px 0 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-align: left;
    }

    /* Dashboard */
    .dash-wrap { overflow-x: auto; margin-top: 8px; }
    .dash-table {
      width: 100%;

    // -------------------- Monetization / CTAs --------------------
    // Each CTA: id (used for tracking), label, icon (key in ICONS), url

    // TODO: Replace placeholders below with real affiliate / payment URLs as you get them.

        { id: 't-league', label: 'Leagues',      icon: 'trophy',    url: '?view=coming-soon&cat=tennis-league' },
        { id: 't-gear',   label: 'Gear',         icon: 'bag',       url: 'https://www.tennis-warehouse.com/' },

        { id: 'vb-league', label: 'Leagues',      icon: 'trophy',    url: '?view=coming-soon&cat=volleyball-league' },

    // -------------------- Analytics --------------------
    // Plausible is the source of truth once the script tag in <head> is uncommented.
    // localStorage counter remains as a per-browser fallback the in-app dashboard reads.
    // track() is a thin wrapper that no-ops safely if Plausible hasn't loaded.
    function track(event, props) {
      try {
        if (typeof window.plausible === 'function') {
          props ? window.plausible(event, { props }) : window.plausible(event);
        }
      } catch (e) {}
    }

    const TRACK_KEY = 'courtside_clicks_v1';
    function recordClick(id) {
      try {
        const all = JSON.parse(localStorage.getItem(TRACK_KEY) || '{}');
        all[id] = (all[id] || 0) + 1;
        all.__lastClick = Date.now();
        localStorage.setItem(TRACK_KEY, JSON.stringify(all));
      } catch (e) {}
      track('cta_click', { id });
    }
    function getClickCounts() {
      try {
        const all = JSON.parse(localStorage.getItem(TRACK_KEY) || '{}');
        delete all.__lastClick;
        return all;
      } catch (e) { return {}; }
    }

    // Dashboard secret key — intentionally plaintext in HTML.
    // OK here ONLY because the dashboard exposes nothing sensitive (local-only counts).
    // Do NOT reuse this pattern for anything that touches real auth/PII/payments.
    const DASHBOARD_KEY = 'courtside2026';

    // -------------------- Helpers --------------------
    function haversineMiles(lat1, lng1, lat2, lng2) {
      const R = 3958.8;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function nearestCourt(lat, lng) {
      return courtsWithDistances(lat, lng)[0];
    }

    function courtsWithDistances(lat, lng) {
      return COURTS
        .filter(c => c.sports.includes(selectedSport))
        .map(c => ({ ...c, dist: haversineMiles(lat, lng, c.lat, c.lng) }))
        .sort((a, b) => a.dist - b.dist);
    }

    function courtsForSelectedSport() {
      return COURTS.filter(c => c.sports.includes(selectedSport));
    }

    function formatDist(d) {
      if (d < 0.1) return '<0.1 mi';
      if (d < 10)  return `${d.toFixed(1)} mi`;
      return `${Math.round(d)} mi`;
    }

    // Build the compact metadata line for a court — "4 courts · lights · hard".
    // Every field is optional; missing fields produce no markup at all (no broken UI).
    function buildCourtMetaHtml(court) {
      const bits = [];
      if (typeof court.numCourts === 'number' && court.numCourts > 0) {
        bits.push(`${court.numCourts} court${court.numCourts === 1 ? '' : 's'}`);
      }
      if (court.lights) bits.push('lights');
      if (court.surface) bits.push(String(court.surface).toLowerCase());
      if (!bits.length && !court.notes) return '';
      const main = bits.length ? `<div class="court-meta">${bits.join(' · ')}</div>` : '';
      const note = court.notes ? `<div class="court-note">${court.notes}</div>` : '';
      return main + note;
    }

    // Maps directions URL — uses court coordinates only, never the user's location.
    function directionsUrl(court) {
      return `https://www.google.com/maps/dir/?api=1&destination=${court.lat},${court.lng}`;
    }

    // Open-Meteo weather, keyless. Uses the COURT's coords, NOT the user's location.
    // Fails silently — returns '' on any error/timeout. Cached in sessionStorage
    // for 10 min per court so re-renders don't refetch.
    const WEATHER_CACHE_MS = 10 * 60 * 1000;
    function weatherCodeToLabel(code) {
      if (code === 0) return 'clear';
      if ([1, 2].includes(code)) return 'mostly clear';
      if (code === 3) return 'cloudy';
      if ([45, 48].includes(code)) return 'foggy';
      if ([51, 53, 55, 56, 57].includes(code)) return 'drizzle';
      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return 'rain';
      if ([71, 73, 75, 77, 85, 86].includes(code)) return 'snow';
      if ([95, 96, 99].includes(code)) return 'thunderstorm';
      return '';
    }
    async function fetchWeather(court) {
      try {
        const cacheKey = `courtside_weather_${court.id}`;
        const cached = sessionStorage.getItem(cacheKey);
        if (cached) {
          const data = JSON.parse(cached);
          if (Date.now() - data.at < WEATHER_CACHE_MS) return data.line;
        }
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${court.lat}&longitude=${court.lng}&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=auto`;
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 4000);
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) return '';
        const json = await res.json();
        const temp = Math.round(json?.current?.temperature_2m);
        const label = weatherCodeToLabel(json?.current?.weather_code);
        if (!Number.isFinite(temp)) return '';
        const line = label ? `${temp}° · ${label}` : `${temp}°`;
        try { sessionStorage.setItem(cacheKey, JSON.stringify({ line, at: Date.now() })); } catch (e) {}
        return line;
      } catch (e) {
        return ''; // fail silently — weather is a nice-to-have, never a blocker
      }
    }

    // -------------------- Feature 4: remember sport + last court --------------------
    // Persisted across visits via localStorage. New users never see clutter.
    const PREFS_KEY = 'courtside_prefs_v1';
    function loadPrefs() {
      try { return JSON.parse(localStorage.getItem(PREFS_KEY) || '{}') || {}; }
      catch (e) { return {}; }
    }
    function savePrefs(patch) {
      try {
        const cur = loadPrefs();
        localStorage.setItem(PREFS_KEY, JSON.stringify({ ...cur, ...patch }));
      } catch (e) {}
    }
    function rememberSport(sport) {
      if (sport && SPORTS[sport]) savePrefs({ sport });
    }
    function rememberLastCourt(courtId) {
      savePrefs({ lastCourt: courtId, lastCourtAt: Date.now() });
    }

    // -------------------- Feature 6: share --------------------
    // Share payload contains ONLY the public site URL and the court name.
    // Never the user's location, coordinates, or any personal data.
    async function shareSite(court) {
      const url = location.origin + '/';
      const text = court
        ? `Booking a court at ${court.name} — ${url}`
        : `Courtside Reservations — ${url}`;
      track('share_tapped', { court: court ? court.id : null });
      // Native share on mobile (and supported desktop browsers)
      if (navigator.share) {
        try {
          await navigator.share({ title: 'Courtside Reservations', text, url });
          return;
        } catch (e) {
          // User cancelled, or share failed — fall through to clipboard
          if (e && e.name === 'AbortError') return;
        }
      }
      // Clipboard fallback
      try {
        await navigator.clipboard.writeText(text);
        toast('Link copied');
      } catch (e) {
        // Last-resort: prompt() so user can still grab the text
        try { window.prompt('Copy this link:', text); } catch (e2) {}
      }
    }

    // Lightweight transient toast used by Share's clipboard fallback.
    let toastTimer = null;
    function toast(msg) {
      let el = document.getElementById('toast');
      if (!el) {
        el = document.createElement('div');
        el.id = 'toast';
        el.className = 'toast';
        document.body.appendChild(el);
      }
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    // Auto-route ("user is at the court") thresholds.
    // Phone GPS error is routinely 20–50m (and worse under tree cover / urban),
    // so a strict 0.1mi cutoff was too tight — a user literally on a court can
    // read >0.1mi away. We auto-route if EITHER:
    //   - nearest court is within AT_COURT_THRESHOLD_MI (absolute distance), OR
    //   - "dominantly nearest" AND still reasonably close:
    //       nearest.dist <= DOMINANT_NEAREST_MAX_MI
    //       AND nearest.dist < second.dist * DOMINANT_NEAREST_RATIO
    //
    // The MAX_MI cap is critical: without it, a user 5mi from any court would
    // get auto-routed to whichever single court is 5x closer than the next one.
    // Far-away users must always land on the court-list fallback.
    //
    // Single-court case (some sports have only a few): use withinAbsolute only.
    // Do NOT auto-route to a single court that's far away.
    const AT_COURT_THRESHOLD_MI   = 0.25;
    const DOMINANT_NEAREST_MAX_MI = 0.5;
    const DOMINANT_NEAREST_RATIO  = 0.6;

    // ==================== v2: Booking preferences ====================
    // User-selected date / time / duration drive the WebTrac deep-link.
    //   date     'YYYY-MM-DD'   (native <input type="date">)
    //   time     'HH:MM' 24h    (custom <select>, 30-min slots in operating hours)
    //   duration 60 | 90 mins   (segmented toggle)
    // Duration is informational; WebTrac doesn't take it as a URL param, so we
    // use it to pick how many slot blocks the WebTrac results page shows.
    const BOOKING_MIN_DAYS_AHEAD = 1;   // WebTrac ≥1 day advance
    const BOOKING_MAX_DAYS_AHEAD = 14;  // …and ≤14 days

    const bookingPrefs = { date: null, time: null, duration: 60 };

    function defaultBookingDateISO() {
      const d = new Date();
      d.setDate(d.getDate() + BOOKING_MIN_DAYS_AHEAD);
      return d.toISOString().slice(0, 10);
    }
    function maxBookingDateISO() {
      const d = new Date();
      d.setDate(d.getDate() + BOOKING_MAX_DAYS_AHEAD);
      return d.toISOString().slice(0, 10);
    }
    // WebTrac slot grid: 30-min increments, operating ~7am to ~9:30pm.
    // Match that exactly so users can't pick a time WebTrac won't accept.
    const BOOKING_FIRST_HOUR = 7;   // 07:00
    const BOOKING_LAST_HOUR  = 21;  // 21:30 inclusive

    function defaultBookingTime24() {
      // Round current time up to next 30-min increment, then clamp into the
      // operating window so the default is always a real WebTrac slot.
      const d = new Date();
      const m = d.getMinutes();
      if (m !== 0) {
        if (m <= 30) d.setMinutes(30, 0, 0);
        else { d.setMinutes(0, 0, 0); d.setHours(d.getHours() + 1); }
      }
      let h = d.getHours();
      let min = d.getMinutes();
      if (h < BOOKING_FIRST_HOUR) { h = BOOKING_FIRST_HOUR; min = 0; }
      if (h > BOOKING_LAST_HOUR || (h === BOOKING_LAST_HOUR && min > 30)) {
        h = BOOKING_LAST_HOUR; min = 30;
      }
      return `${String(h).padStart(2, '0')}:${String(min).padStart(2, '0')}`;
    }

    // Returns array of { value: 'HH:MM', label: '7:00 AM' } for every valid slot.
    function listBookingTimes() {
      const out = [];
      for (let h = BOOKING_FIRST_HOUR; h <= BOOKING_LAST_HOUR; h++) {
        for (const m of [0, 30]) {
          const v = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
          const ampm = h >= 12 ? 'PM' : 'AM';
          const h12 = h % 12 === 0 ? 12 : h % 12;
          out.push({ value: v, label: `${h12}:${String(m).padStart(2, '0')} ${ampm}` });
        }
      }
      return out;
    }
    function initBookingPrefsIfNeeded() {
      if (!bookingPrefs.date) bookingPrefs.date = defaultBookingDateISO();
      if (!bookingPrefs.time) bookingPrefs.time = defaultBookingTime24();
    }

    function isoToWebtracDate(iso) {
      const [y, m, d] = iso.split('-');
      return `${m}/${d}/${y}`;
    }
    function time24toWebtracTime(t) {
      const [h, m] = t.split(':').map(Number);
      const ampm = h >= 12 ? 'pm' : 'am';
      const h12 = h % 12 === 0 ? 12 : h % 12;
      return `${String(h12).padStart(2, '0')}:${String(m).padStart(2, '0')} ${ampm}`;
    }
    function durationToBlocks(duration) {
      return duration === 90 ? '6' : '4';
    }

    function bookingDate() {
      initBookingPrefsIfNeeded();
      return isoToWebtracDate(bookingPrefs.date);
    }
    function bookingBeginTime() {
      initBookingPrefsIfNeeded();
      return time24toWebtracTime(bookingPrefs.time);
    }
    function bookingBlocksToDisplay() {
      return durationToBlocks(bookingPrefs.duration);
    }

    // -------------------- Availability (live slot data via Netlify Function) --------------------
    // GET /.netlify/functions/availability?court=…&date=MM/DD/YYYY&sport=…
    // Returns { slots: [{ start: 'HH:MM', available: bool }, …] }.
    // Cached in-memory + sessionStorage, keyed by court|date|sport, for 60s.
    const AVAILABILITY_TTL_MS = 60 * 1000;
    const availabilityMemCache = new Map();

    function availabilityCacheGet(key) {
      const mem = availabilityMemCache.get(key);
      if (mem && Date.now() - mem.at < AVAILABILITY_TTL_MS) return mem.slots;
      try {
        const raw = sessionStorage.getItem('courtside_avail_' + key);
        if (raw) {
          const obj = JSON.parse(raw);
          if (Date.now() - obj.at < AVAILABILITY_TTL_MS) {
            availabilityMemCache.set(key, obj);
            return obj.slots;
          }
        }
      } catch (e) {}
      return null;
    }
    function availabilityCacheSet(key, slots) {
      const entry = { slots, at: Date.now() };
      availabilityMemCache.set(key, entry);
      try { sessionStorage.setItem('courtside_avail_' + key, JSON.stringify(entry)); } catch (e) {}
    }

    async function fetchAvailability(courtCode, sportType) {
      const dateMMDDYYYY = isoToWebtracDate(bookingPrefs.date);
      const key = `${courtCode}|${dateMMDDYYYY}|${sportType}`;
      const cached = availabilityCacheGet(key);
      if (cached) return cached;
      const url = '/.netlify/functions/availability'
        + `?court=${encodeURIComponent(courtCode)}`
        + `&date=${encodeURIComponent(dateMMDDYYYY)}`
        + `&sport=${encodeURIComponent(sportType)}`;
      console.log('[availability] fetching', url);
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 15000);
      try {
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) {
          // Try to extract the function's error body for a better message.
          let bodyText = '';
          try { bodyText = await res.text(); } catch (e) {}
          const err = new Error('HTTP ' + res.status);
          err.status = res.status;
          err.body = bodyText;
          console.warn('[availability] non-OK response', res.status, bodyText);
          throw err;
        }
        const data = await res.json();
        const slots = Array.isArray(data.slots) ? data.slots : [];
        console.log('[availability] got', slots.length, 'slots',
                    `(${slots.filter(s=>!s.available).length} taken)`);
        availabilityCacheSet(key, slots);
        return slots;
      } catch (e) {
        clearTimeout(timer);
        console.warn('[availability] failed:', e && e.message || e, e);
        // Surface the error so refreshAvailability can show a specific message.
        return { __error: true, status: e && e.status, message: e && e.message };
      }
    }

    // Apply availability data to the live #prefTime <select>. Disabled options
    // get a " — Unavailable" suffix and grey out (browser default for :disabled).
    // Available options stash their bookingUrl in dataset so the Open button
    // can deep-link the user straight into "slot in cart" on WebTrac.
    function applyAvailabilityToTimeSelect(slots, statusEl) {
      const select = document.getElementById('prefTime');
      if (!select) return;
      const lookup = new Map((slots || []).map(s => [s.start, s]));
      Array.from(select.options).forEach(opt => {
        const baseLabel = opt.dataset.baseLabel || opt.text.replace(/ — Unavailable$/, '');
        opt.dataset.baseLabel = baseLabel;
        const info = lookup.get(opt.value);
        if (info && info.available === false) {
          opt.disabled = true;
          opt.text = baseLabel + ' — Unavailable';
          delete opt.dataset.bookingUrl;
        } else {
          opt.disabled = false;
          opt.text = baseLabel;
          if (info && info.bookingUrl) opt.dataset.bookingUrl = info.bookingUrl;
          else delete opt.dataset.bookingUrl;
        }
      });
      if (select.options[select.selectedIndex] && select.options[select.selectedIndex].disabled) {
        const next = Array.from(select.options).find(o => !o.disabled);
        if (next) {
          select.value = next.value;
          bookingPrefs.time = next.value;
        }
      }
      if (statusEl) statusEl.textContent = '';
    }

    function clearAvailabilityFromTimeSelect() {
      const select = document.getElementById('prefTime');
      if (!select) return;
      Array.from(select.options).forEach(opt => {
        opt.disabled = false;
        if (opt.dataset.baseLabel) opt.text = opt.dataset.baseLabel;
        delete opt.dataset.bookingUrl;
      });
    }

    // Look up the live booking URL for whatever time is currently selected.
    // Returns null if availability data hasn't loaded yet or the slot has no URL
    // (in which case the caller falls back to the generic search URL).
    function selectedSlotBookingUrl() {
      const select = document.getElementById('prefTime');
      if (!select) return null;
      const opt = select.options[select.selectedIndex];
      return opt && opt.dataset.bookingUrl ? opt.dataset.bookingUrl : null;
    }

    async function refreshAvailability(court, statusEl) {
      if (!court || !court.code || court.code === 'TBD') return;
      const sportType = SPORTS[selectedSport].type;
      if (statusEl) statusEl.textContent = 'Checking availability…';
      const result = await fetchAvailability(court.code, sportType);
      if (result && result.__error) {
        // Specific error message so you know WHY it failed in DevTools.
        clearAvailabilityFromTimeSelect();
        if (statusEl) {
          const hint = result.status === 404 ? 'function not deployed'
                     : result.status === 500 ? 'env var likely missing'
                     : result.status === 502 ? 'scraper rejected'
                     : 'check console';
          statusEl.textContent = `Couldn't load availability (${result.status || 'network'}) — ${hint}`;
        }
        return;
      }
      applyAvailabilityToTimeSelect(result, statusEl);
    }

    function webtracUrl(code) {
      const u = new URL('https://vaarlingtonweb.myvscloud.com/webtrac/web/search.html');
      u.searchParams.set('Action', 'Start');
      u.searchParams.set('SubAction', '');
      u.searchParams.set('type', SPORTS[selectedSport].type);
      u.searchParams.set('location', code);

      // Guard against the qrcode global being missing entirely (e.g., the inline

      if (typeof qrcode !== 'function') {

        try {
          const qr = qrcode(0, 'M');  // auto type, medium error correction
          qr.addData(scanUrl);
          qr.make();
          qrMarkup = qr.createSvgTag({ cellSize: 8, margin: 0, scalable: true });
        } catch (e) {
          qrMarkup = `
            <div class="error" style="text-align: center;">

    function requestLocation() {
      renderLocating();
      if (!('geolocation' in navigator)) {
        renderFallback('Your browser does not support geolocation.');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        pos => {
          track('location_granted', { sport: selectedSport });
          const userLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          const sorted = courtsWithDistances(userLoc.lat, userLoc.lng);
          const court = sorted[0];
          const second = sorted[1];
          if (!court || !court.code || court.code === 'TBD') {
            renderFallback(
              court
                ? `The closest court (${court.name}) isn't configured yet — ` +
                  `its WebTrac location code needs to be filled in.`
                : `No courts configured for this sport yet.`,
              userLoc
            );
            return;
          }
          // Auto-route if user is clearly AT a court. Two-pronged check
          // because GPS error alone can push them past a strict absolute distance.
          // The dominant-nearest branch is distance-capped so a user miles away
          // never gets auto-routed just because one court is closer than the rest.
          const withinAbsolute = court.dist <= AT_COURT_THRESHOLD_MI;
          const dominantNearest = second
            ? (court.dist <= DOMINANT_NEAREST_MAX_MI &&
               court.dist < second.dist * DOMINANT_NEAREST_RATIO)
            : false; // single-court case: rely on withinAbsolute only
          if (withinAbsolute || dominantNearest) {
            renderPostBooking(court, userLoc);
          } else {
            renderFallback(null, userLoc);
          }
        },
        err => {
          track('location_denied', { code: err.code, sport: selectedSport });
          if (err.code === 1) {
            renderDeniedHelp();
          } else {
            const msg =
              err.code === 2 ? "Couldn't determine your location." :
              err.code === 3 ? 'Location request timed out.' :
              'Could not get your location.';
            renderFallback(msg);
          }
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    }

    const CONTACT_EMAIL = 'support@courtsidereservations.com';

    // Email validation — intentionally simple (RFC-perfect regex is overkill).
    // Rejects empty / no @ / no dot-after-@ / spaces.
    function isValidEmail(s) {
      if (!s || typeof s !== 'string') return false;
      const t = s.trim();
      if (t.length < 5 || t.length > 254 || /\s/.test(t)) return false;
      const at = t.indexOf('@');
      if (at < 1 || at !== t.lastIndexOf('@')) return false;
      const dom = t.slice(at + 1);
      return dom.includes('.') && !dom.startsWith('.') && !dom.endsWith('.');
    }

    /**

     * is set to hook up validation + submission.

    function buildNotifyFormHtml(waitlistKey, purpose) {
      return `

          <p class="notify-fineprint">${purpose}</p>

                 autocomplete="email" inputmode="email" required>
          <div class="notify-error" id="notifyError"></div>
          <button class="btn btn-primary" type="submit">Notify me</button>
        </form>
        <div class="notify-success" id="notifySuccess" hidden>
          Thanks — we'll let you know when it launches.
        </div>
      `;
    }

    function wireNotifyForm() {
      const form = document.getElementById('notifyForm');
      if (!form) return;
      const input = document.getElementById('notifyEmail');
      const errEl = document.getElementById('notifyError');
      const success = document.getElementById('notifySuccess');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = (input.value || '').trim();
        if (!isValidEmail(email)) {
          errEl.textContent = 'Enter a valid email address.';
          input.focus();
          return;
        }
        errEl.textContent = '';
        const waitlist = form.dataset.waitlist || '(general)';

        // TODO: POST { email, waitlist, ts: Date.now() } to the real submission
        // endpoint when one exists (e.g. Netlify Forms, Formspree, a Worker, etc.).
        // Until then we just record the event and show success.
        // Example shape when ready:
        //   fetch('/api/waitlist', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        //                            body: JSON.stringify({ email, waitlist }) })
        //     .catch(() => {}); // fail silently — track() already fired
        track('waitlist_signup', { waitlist });

        form.hidden = true;
        success.hidden = false;
      });
      // Clear error on edit
      input.addEventListener('input', () => { errEl.textContent = ''; });
    }

    function renderContact() {
      card.innerHTML = `
        ${backLinkHtml}
        <div class="pin-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6h16v12H4z"/>
            <path d="M4 7l8 6 8-6"/>
          </svg>
        </div>
        <h1>Send us<br><em>a message</em></h1>
        <p class="perm-body">Ideas, feedback, partnership pitches, bugs — straight to our inbox. We read everything.</p>
        <form id="contactForm" class="notify-form"
              name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
          <input type="hidden" name="form-name" value="contact">
          <p hidden><label>Don't fill this out: <input name="bot-field"></label></p>
          <input id="cName" name="name" type="text" placeholder="Your name (optional)" autocomplete="name">
          <input id="cEmail" name="email" type="email" placeholder="you@example.com" autocomplete="email" inputmode="email" required>
          <textarea id="cMessage" name="message" placeholder="What's on your mind?" rows="5" required></textarea>
          <div class="notify-error" id="contactError"></div>
          <button class="btn btn-primary" type="submit" id="contactSubmit">Send</button>
        </form>
        <div class="notify-success" id="contactSuccess" hidden>
          Thanks — we got your message and will get back to you soon.
        </div>
        <button class="btn btn-secondary" id="homeBtn" style="margin-top: 14px;">Back to start</button>
      `;

      document.getElementById('homeBtn').addEventListener('click', () => { location.href = location.pathname; });

      const form = document.getElementById('contactForm');
      const emailEl = document.getElementById('cEmail');
      const msgEl = document.getElementById('cMessage');
      const errEl = document.getElementById('contactError');
      const successEl = document.getElementById('contactSuccess');
      const submitBtn = document.getElementById('contactSubmit');

      const clearErr = () => { errEl.textContent = ''; };
      emailEl.addEventListener('input', clearErr);
      msgEl.addEventListener('input', clearErr);

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = (emailEl.value || '').trim();
        const message = (msgEl.value || '').trim();
        if (!isValidEmail(email)) {
          errEl.textContent = 'Enter a valid email address.';
          emailEl.focus();
          return;
        }
        if (message.length < 4) {
          errEl.textContent = 'Tell us a little more.';
          msgEl.focus();
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending…';

        // Netlify Forms: POST application/x-www-form-urlencoded to "/".
        // form-name must be included; Netlify routes to the matching form schema
        // declared in the static HTML at the top of <body>.
        // 15s timeout so the button never stays stuck on "Sending…" if Netlify
        // never responds (form not detected, network drop, etc.).
        const data = new URLSearchParams(new FormData(form)).toString();
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);

        fetch('/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: data,
          signal: controller.signal,
        }).then((res) => {
          clearTimeout(timeout);
          console.log('[contact form] response:', res.status, res.statusText);
          if (!res.ok) throw new Error('Submit failed: ' + res.status);
          track('contact_sent', {});
          form.hidden = true;
          successEl.hidden = false;
        }).catch((err) => {
          clearTimeout(timeout);
          console.error('[contact form] fetch error:', err);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send';
          const msg = (err && err.name === 'AbortError')
            ? 'Request timed out. Check that Netlify Forms is enabled, or email us at ' + CONTACT_EMAIL + '.'
            : "Couldn't send right now. Try again, or email us at " + CONTACT_EMAIL + '.';
          errEl.textContent = msg;
        });
      });

      wireBackLink();
    }

    function renderWorkWithUs() {
      card.innerHTML = `
        ${backLinkHtml}
        <div class="pin-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2.5" y="7.5" width="19" height="13" rx="2"/>
            <path d="M8 7.5V5.5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            <line x1="2.5" y1="13" x2="21.5" y2="13"/>
          </svg>
        </div>
        <h1>Work<br><em>with us</em></h1>

        <div class="module">
          <div class="module-label">Support us</div>
          <p>We're working hard to make plugging into Arlington's sports community effortless. The biggest help: tell a friend.</p>
          <button class="btn btn-ghost" type="button" data-action="share" data-cta-id="wwu-share">Share Courtside</button>
        </div>

        <div class="module">
          <div class="module-label">Buy us a coffee</div>
          <p>Like what we're building? A coffee helps keep the work going.</p>
          <!-- TODO: replace href below with the real Buy Me a Coffee URL once set up,
               then drop the ?view=coming-soon placeholder. -->
          <a class="btn btn-ghost" href="?view=coming-soon&cat=buy-us-coffee" data-cta-id="wwu-coffee">Buy us a coffee</a>
        </div>

        <div class="module">
          <div class="module-label">Contact us</div>
          <p>Ideas, suggestions, bugs, partnerships — we'd love to hear from you.</p>
          <a class="btn btn-ghost" href="?view=contact" data-cta-id="wwu-contact">Send a message</a>
        </div>

        <div class="module">
          <div class="module-label">Stay in the loop</div>
          ${buildNotifyFormHtml('work-with-us', "We'll only email you when we ship something new. Never shared, no spam.")}
        </div>

        <button class="btn btn-secondary" id="homeBtn" style="margin-top: 4px;">Back to start</button>
      `;
      document.getElementById('homeBtn').addEventListener('click', () => { location.href = location.pathname; });
      wireNotifyForm();
      wireBackLink();
    }

    function renderComingSoon() {
      const cat = (params.get('cat') || '').replace(/-/g, ' ');
      const waitlistKey = params.get('cat') || 'general';
      const purpose = `We'll only use your email to tell you when this is ready — never anything else, never shared.`;
      card.innerHTML = `
        ${backLinkHtml}
        <div class="pin-circle" style="background: rgba(var(--accent-rgb), 0.10);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 2"/>
          </svg>
        </div>
        <h1>Coming<br><em>soon</em></h1>
        <p class="perm-body" style="margin-bottom: 16px;">${cat ? `The <strong>${cat}</strong> directory is in the works.` : 'This page is in the works.'}</p>
        ${buildNotifyFormHtml(waitlistKey, purpose)}
        <a href="#" class="inline-link" data-action="share" data-cta-id="comingsoon-share"
           style="display: inline-block; margin: 14px auto 0; font-size: 14px;">Share Courtside →</a>
        <button class="btn btn-secondary" id="homeBtn" style="margin-top: 14px;">Back to start</button>
      `;
      document.getElementById('homeBtn').addEventListener('click', () => { location.href = location.pathname; });
      wireNotifyForm();
      wireBackLink();
    }

    function renderDashboard() {
      if (params.get('key') !== DASHBOARD_KEY) {
        card.innerHTML = `<h1>Not<br><em>found</em></h1><p class="perm-body">Nothing here.</p>`;
        return;
      }
      const counts = getClickCounts();
      const allCtas = [].concat(...Object.values(POST_BOOKING_CTAS));
      const unique = [...new Map(allCtas.map(c => [c.id, c])).values()];
      const total = Object.values(counts).reduce((a, b) => a + b, 0);
      const rows = unique
        .map(c => ({ ...c, count: counts[c.id] || 0 }))
        .sort((a, b) => b.count - a.count)
        .map(r => `
          <tr>
            <td class="dash-icon">${ICONS[r.icon] || ''}</td>
            <td class="dash-label">${r.label}</td>
            <td class="dash-id">${r.id}</td>
            <td class="dash-count">${r.count}</td>
          </tr>`).join('');
      card.innerHTML = `
        <h1>Click<br><em>dashboard</em></h1>
        <p class="perm-body">Total clicks (this browser only): <strong>${total}</strong></p>
        <div class="dash-wrap">
          <table class="dash-table">
            <thead><tr><th></th><th>CTA</th><th>id</th><th>clicks</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="reenable" style="margin-top: 18px;">
          <strong>Note:</strong> these counts are localStorage-only (this browser).
          <strong>Plausible</strong> is the cross-user source of truth once the script tag in
          <code>&lt;head&gt;</code> is uncommented and the site domain is set.
        </div>
        <button class="btn btn-secondary" id="resetBtn">Reset counts</button>
      `;
      document.getElementById('resetBtn').addEventListener('click', () => {
        if (confirm('Reset all click counts?')) {
          localStorage.removeItem(TRACK_KEY);
          renderDashboard();
        }
      });
    }

    // Build the "While you're here" CTA list HTML (shared by renderPostBooking and renderFallback)
    function buildCtaListHtml() {
      const ctas = (POST_BOOKING_CTAS[selectedSport] || POST_BOOKING_CTAS.tennis);
      return ctas.map(c => {
        const external = c.url.startsWith('http');
        const targetAttr = external ? ' target="_blank" rel="noopener"' : '';
        return `
          <a class="cta" href="${c.url}"${targetAttr} data-cta-id="${c.id}">
            <span class="cta-icon">${ICONS[c.icon] || ''}</span>
            <span class="cta-label">${c.label}</span>
            <span class="cta-arrow">→</span>
          </a>`;
      }).join('');
    }

    const NEARBY_INITIAL_COUNT = 3;

    // Renders the court list. Two modes:
    //   - With userLoc (sorted by distance, distances shown)   → "Closest X courts"
    //                                                            shows top 3 + Show more + CTAs
    //   - Without userLoc (alphabetical, no distances)         → "Pick an X court"
    //                                                            full list, no CTAs
    function renderFallback(errMsg, userLoc) {
      const sport = SPORTS[selectedSport];
      const nearby = userLoc != null;
      const courts = nearby
        ? courtsWithDistances(userLoc.lat, userLoc.lng)
        : courtsForSelectedSport();
      const items = courts.map((c, i) => {
        const disabled = !c.code || c.code === 'TBD';
        const right = disabled
          ? '<span class="tag">setup needed</span>'
          : (nearby
              ? `<span class="pick-meta">${formatDist(c.dist)} <span class="pick-arrow">→</span></span>`
              : '<span class="arrow">→</span>');
        const hidden = nearby && i >= NEARBY_INITIAL_COUNT ? ' collapsed' : '';
        // href="#" + JS preventDefault — tapping a court opens the date/time
        // picker for that court rather than navigating directly to WebTrac.
        return `
          <a class="pick${disabled ? ' disabled' : ''}${hidden}" href="#" data-court-id="${c.id}">
            <span class="pick-name">${c.name}</span>
            ${right}
          </a>`;
      }).join('');

      const title = nearby
        ? `Closest ${sport.label.toLowerCase()} courts`
        : `Pick a ${sport.label.toLowerCase()} court`;
      const sub = nearby
        ? `<p class="perm-body" style="margin-bottom: 16px;">Here are some courts near you.</p>`
        : '';

      const showMoreBtn = (nearby && courts.length > NEARBY_INITIAL_COUNT)
        ? `<button class="btn btn-ghost" id="showMoreBtn" style="margin-top: 14px;">Show more</button>`
        : '';

      const skipBtn = nearby
        ? `<button class="btn btn-secondary" id="skipBtn">Continue to booking site</button>`
        : '';

      const ctaSection = nearby ? `
        <div class="cta-divider">While you're here</div>
        <div class="cta-list">${buildCtaListHtml()}</div>
      ` : '';

      card.innerHTML = `
        ${backLinkHtml}
        ${sportIconSvg(selectedSport, false)}
        <h1>${title}</h1>
        ${sub}
        ${errMsg ? `<div class="error">${errMsg}</div>` : ''}
        <div class="picker">${items}</div>
        ${showMoreBtn}
        ${skipBtn}
        ${ctaSection}
      `;

      // Tapping a court in the list now opens the date/time picker for that
      // court (renderPostBooking). The actual WebTrac open happens later when
      // the user taps "Open booking site →" in the picker.
      card.querySelectorAll('a[data-court-id]').forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          const courtId = a.dataset.courtId;
          const court = courts.find(c => c.id === courtId);
          if (!court || !court.code || court.code === 'TBD') return;
          track('court_selected_from_list', {
            sport: selectedSport,
            court: courtId,
            source: nearby ? 'nearby-list' : 'manual-list',
          });
          renderPostBooking(court, userLoc);
        });
      });

      // CTA click tracking
      card.querySelectorAll('a[data-cta-id]').forEach(a => {
        a.addEventListener('click', () => recordClick(a.dataset.ctaId));
      });

      // Show more button reveals collapsed courts
      const showMore = document.getElementById('showMoreBtn');
      if (showMore) {
        showMore.addEventListener('click', () => {
          card.querySelectorAll('.pick.collapsed').forEach(el => el.classList.remove('collapsed'));
          showMore.style.display = 'none';
        });
      }

      // "Just take me to the booking site" — opens WebTrac with all courts of this sport
      const skip = document.getElementById('skipBtn');
      if (skip) {
        skip.addEventListener('click', () => { location.href = webtracAllCourtsUrl(); });
      }

      wireBackLink();
    }

    // -------------------- Main --------------------
    function continueToLocation() {
      if (navigator.permissions && navigator.permissions.query) {
        navigator.permissions.query({ name: 'geolocation' }).then(
          result => {
            if (result.state === 'granted') requestLocation();
            else if (result.state === 'denied') renderDeniedHelp();
            else renderPermissionPrompt();
          },
          () => renderPermissionPrompt()
        );
      } else {
        renderPermissionPrompt();
      }
    }

    // Routing:
    //   /            → sport picker (start of flow) — what people see when scanning QR or typing the URL
    //   /?qr=1       → QR display (for grabbing/printing the QR)
    //   /?go=1       → sport picker (legacy support for old printed QR codes)
    const params = new URLSearchParams(location.search);

    function showInitialView() {
      const view = params.get('view');
      if (params.has('qr'))           return renderQrDisplay();
      if (view === 'dashboard')       return renderDashboard();
      if (view === 'contact')         return renderContact();
      if (view === 'coming-soon') {
        // The Work with us page has its own multi-module layout.
        if (params.get('cat') === 'work-with-us') return renderWorkWithUs();
        return renderComingSoon();
      }
      if (view === 'post-booking') {
        // Testing affordance: ?view=post-booking&sport=tennis&court=quincy
        // renders the full court result screen (weather, directions, share, rules).
        // Without &court=, falls back to the "Got your slot?" return-from-WebTrac view.
        const courtId = params.get('court');
        const c = courtId && COURTS.find(x => x.id === courtId);
        return renderPostBooking(c ? { ...c, dist: 0 } : null);
      }

      // Default route: check if user just came back from WebTrac → show post-booking
      const last = sessionStorage.getItem('lastBooking');
      if (last) {
        try {
          const data = JSON.parse(last);
          if (Date.now() - data.when < 30 * 60 * 1000) {
            selectedSport = data.sport || 'tennis';
            track('returned_from_webtrac', { sport: selectedSport });
            return renderPostBooking();
          } else {
            sessionStorage.removeItem('lastBooking');
          }
        } catch (e) {}
      }
      renderSportPicker();
    }

    // Inject icons into footer links (HTML can't access JS ICONS map directly).
    document.querySelectorAll('.app-footer a[data-icon]').forEach(a => {
      const iconName = a.dataset.icon;
      const label = a.textContent;
      if (ICONS[iconName]) {
        a.innerHTML = ICONS[iconName] + '<span>' + label + '</span>';
      }
    });

    showInitialView();

    // Delegated click tracker — fires for any element with data-cta-id (e.g., footer links).
    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-cta-id]');
      if (el) recordClick(el.dataset.ctaId);
    });

    // Delegated share handler — drop a `data-action="share"` attribute on any
    // anchor or button anywhere in the app and it'll trigger the native share
    // sheet (with clipboard fallback). Never includes user location.
    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-action="share"]');
      if (el) {
        e.preventDefault();
        shareSite(null);
      }
    });

    // When the user hits browser back from WebTrac, the page may be restored
    // from the back/forward cache. Re-route so they see the post-booking screen
    // (or sport picker if no recent booking).
    window.addEventListener('pageshow', (event) => {
      if (event.persisted && !params.has('qr')) {
        showInitialView();
      }
    });

    // -------------------- Service worker (PWA) --------------------
    // Caches the app shell so the site loads instantly + survives flaky connections.
    // Feature-detected; fails silently if unsupported (file://, old browsers, etc.).
    // WebTrac, weather, and analytics are NOT cached — they always hit the network.
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {
          // Silent — SW is a progressive enhancement, never required for the app to work.
        });
      });
    }
  </script>
</body>
