</script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --accent: #22D3EE;             /* electric cyan */
      --accent-deep: #06B6D4;
      --accent-rgb: 34, 211, 238;
      --bg: #0A0F16;                 /* near-black with cool tint */
      --bg-tint: #131B25;
      --card: #161F2B;
      --card-elev: #1D2735;          /* slightly raised surface */
      --ink: #F1F5F9;
      --muted: #8B96A8;
      --line: rgba(255, 255, 255, 0.08);
      --error: #F87171;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(var(--accent-rgb), 0.10) 0%, transparent 70%),
        var(--bg);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .main {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .app-footer {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    .app-footer a {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 4px;
      transition: color 0.15s;
    }
    .app-footer a:hover { color: var(--accent); }
    .app-footer a svg { width: 13px; height: 13px; }
    .app-footer .dot { margin: 0 4px; opacity: 0.5; }

    .card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 48px 40px 40px;
      text-align: center;
      max-width: 460px;
      width: 100%;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.04) inset,
        0 20px 60px -20px rgba(0, 0, 0, 0.5);
    }

    .back-link {
      position: absolute;
      top: 18px;
      left: 22px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 8px;
      margin: 0;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }
    .back-link:hover { color: var(--accent); background: rgba(var(--accent-rgb), 0.06); }

    /* Post-booking CTA list */
    .cta-list { display: grid; gap: 10px; margin-top: 8px; }
    .cta {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--card-elev);
      border: 1px solid var(--line);
      border-radius: 14px;
      text-decoration: none;
      color: var(--ink);
      font-weight: 500;
      transition: border-color 0.15s, transform 0.05s;
    }
    .cta:hover { border-color: rgba(var(--accent-rgb), 0.50); }
    .cta:active { transform: scale(0.99); }
    .cta-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .cta-icon svg { width: 100%; height: 100%; }
    .cta-label {
      flex: 1;
      text-align: left;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.005em;
    }
    .cta-arrow { color: var(--accent); font-size: 18px; }
    .cta-divider {
      margin: 24px 0 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-align: left;
    }

    /* Dashboard */
    .dash-wrap { overflow-x: auto; margin-top: 8px; }
    .dash-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .dash-table th, .dash-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }
    .dash-table th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 600;
    }
    .dash-icon { width: 24px; color: var(--muted); }
    .dash-icon svg { width: 18px; height: 18px; display: block; }
    .dash-label { font-weight: 500; }
    .dash-id {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .dash-count {
      text-align: right;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .reenable code {
      background: rgba(255, 255, 255, 0.06);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    .inline-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .inline-link:hover { text-decoration: underline; }

    .ball {
      width: 56px;
      height: 56px;
      margin: 0 auto 24px;
      display: block;
    }
    .ball.spin { animation: spin 1.2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sport-trio {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 24px;
    }
    .sport-trio .ball {
      width: 40px;
      height: 40px;
      margin: 0;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 38px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 0 0 10px;
      color: var(--ink);
    }
    h1 em {
      font-style: italic;
      font-weight: 500;
      color: var(--accent);
    }

    .sub {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 32px;
    }

    .qr-wrap {
      background: white;            /* QR readability — high contrast */
      border-radius: 20px;
      padding: 20px;
      margin: 0 auto 28px;
      max-width: 340px;
      box-shadow: 0 0 0 1px rgba(var(--accent-rgb), 0.30),
                  0 0 40px -8px rgba(var(--accent-rgb), 0.20);
    }
    .qr-wrap img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    .hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      background: rgba(var(--accent-rgb), 0.08);
      padding: 10px 18px;
      border-radius: 999px;
    }
    .hint svg { width: 16px; height: 16px; }

    /* Scan flow */
    .status {
      font-size: 16px;
      color: var(--muted);
      margin: 0 0 24px;
      min-height: 1.4em;
    }
    .nearest-name {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--accent);
    }
    .nearest-dist {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    .court-meta {
      margin-top: 8px;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .court-note {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
    }
    .weather-line {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      min-height: 1em;
      transition: opacity 0.3s;
    }
    .weather-line[hidden] { display: none; }
    .secondary-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .secondary-actions .btn { margin-bottom: 0; flex: 1; }
    .rules-hint {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.01em;
    }
    .recent-shortcut {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 16px;
      background: var(--card-elev);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--ink);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 18px;
      transition: border-color 0.15s;
    }
    .recent-shortcut:hover { border-color: rgba(var(--accent-rgb), 0.45); }
    .recent-shortcut .recent-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .recent-shortcut .recent-name { font-weight: 600; color: var(--ink); }
    .recent-shortcut .recent-arrow { color: var(--accent); }

    /* Email capture form (Coming Soon) */
    .notify-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 6px 0 8px;
    }
    .notify-form input {
      width: 100%;
      padding: 14px 16px;
      background: var(--card-elev);
      border: 1.5px solid var(--line);
      border-radius: 12px;
      color: var(--ink);
      font-family: inherit;
      font-size: 15px;
      transition: border-color 0.15s;
    }
    .notify-form input:focus {
      outline: none;
      border-color: rgba(var(--accent-rgb), 0.50);
    }
    .notify-form input::placeholder,
    .notify-form textarea::placeholder { color: var(--muted); opacity: 0.7; }
    .notify-form textarea {
      width: 100%;
      padding: 14px 16px;
      background: var(--card-elev);
      border: 1.5px solid var(--line);
      border-radius: 12px;
      color: var(--ink);
      font-family: inherit;
      font-size: 15px;
      resize: vertical;
      min-height: 120px;
      transition: border-color 0.15s;
    }
    .notify-form textarea:focus {
      outline: none;
      border-color: rgba(var(--accent-rgb), 0.50);
    }
    .notify-fineprint {
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 8px;
      line-height: 1.45;
    }
    .notify-error {
      color: var(--error);
      font-size: 12px;
      margin-top: -4px;
      min-height: 1em;
    }
    .notify-success {
      background: rgba(var(--accent-rgb), 0.08);
      border: 1px solid rgba(var(--accent-rgb), 0.30);
      color: var(--accent);
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      margin: 8px 0 4px;
    }
    /* v3: When picker — date + time + duration on the closest-court screen */
    .when-picker {
      margin: 18px 0 14px;
      padding: 14px 16px;
      background: var(--card-elev);
      border: 1px solid var(--line);
      border-radius: 14px;
      text-align: left;
    }
    .when-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 10px;
    }
    .when-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .date-chip-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-bottom: 10px;
    }
    .date-chip {
      min-height: 48px;
      padding: 8px 6px;
      background: var(--card);
      border: 1.5px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-family: inherit;
      font-weight: 650;
      font-size: 12px;
      line-height: 1.15;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .date-chip:hover { border-color: rgba(var(--accent-rgb), 0.30); }
    .date-chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(var(--accent-rgb), 0.06);
    }
    .date-chip:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }
    .date-chip span {
      display: block;
      margin-top: 3px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
    }
    .when-locked {
      display: grid;
      gap: 10px;
    }
    .selected-when {
      padding: 13px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(var(--accent-rgb), 0.32);
      background: rgba(var(--accent-rgb), 0.08);
      text-align: left;
    }
    .selected-when strong {
      display: block;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.25;
    }
    .selected-when span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .when-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--card);
      border: 1.5px solid var(--line);
      border-radius: 10px;
      color: var(--ink);
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      transition: border-color 0.15s;
      /* Normalize native date/time picker appearance across iOS/Android */
      -webkit-appearance: none;
      appearance: none;
      color-scheme: dark;
    }
    .when-input:focus { outline: none; border-color: rgba(var(--accent-rgb), 0.50); }
    .duration-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .seg {
      padding: 10px 12px;
      background: var(--card);
      border: 1.5px solid var(--line);
      border-radius: 10px;
      color: var(--muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .seg:hover { border-color: rgba(var(--accent-rgb), 0.30); }
    .seg.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(var(--accent-rgb), 0.06);
    }
    .booking-range {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(var(--accent-rgb), 0.08);
      border: 1px solid rgba(var(--accent-rgb), 0.30);
      border-radius: 10px;
      font-weight: 500;
      font-size: 16px;
      color: var(--ink);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .court-unit-picker {
      margin-top: 14px;
    }
    .court-unit-picker[hidden] { display: none; }
    .court-unit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
      gap: 8px;
    }
    .court-unit-btn {
      min-height: 70px;
      padding: 10px;
      background: var(--card);
      border: 1.5px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
    }
    .court-unit-btn:hover {
      border-color: rgba(var(--accent-rgb), 0.35);
      transform: translateY(-1px);
    }
    .court-unit-btn.active {
      border-color: var(--accent);
      background: rgba(var(--accent-rgb), 0.08);
    }
    .court-unit-btn.unavailable {
      cursor: not-allowed;
      opacity: 0.58;
      border-color: rgba(248, 113, 113, 0.28);
      background: rgba(248, 113, 113, 0.055);
    }
    .court-unit-btn.unavailable:hover {
      transform: none;
      border-color: rgba(248, 113, 113, 0.28);
    }
    .court-unit-name {
      display: block;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.2;
    }
    .court-unit-meta {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }
    .avail-status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      min-height: 1em;
      text-align: left;
    }
    .reserve-status {
      margin: 2px 0 12px;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.035);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: left;
    }
    .reserve-status[hidden] { display: none; }
    .reserve-status.ok {
      border-color: rgba(var(--accent-rgb), 0.35);
      background: rgba(var(--accent-rgb), 0.08);
      color: var(--ink);
    }
    .reserve-status.warn {
      border-color: rgba(248, 113, 113, 0.35);
      background: rgba(248, 113, 113, 0.08);
      color: var(--ink);
    }
    .payment-panel {
      margin: 8px 0 12px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(var(--accent-rgb), 0.28);
      background: rgba(var(--accent-rgb), 0.07);
      text-align: left;
    }
    .payment-panel[hidden] { display: none; }
    .payment-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .payment-amount {
      font-size: 20px;
      line-height: 1;
      color: var(--ink);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .payment-element {
      padding: 10px;
      border-radius: 10px;
      background: #fff;
    }
    .booking-disclosure {
      margin: 10px 0;
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }
    .payment-status {
      margin-top: 8px;
      min-height: 1em;
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
    }
    .payment-status.ok { color: var(--ink); }
    .payment-status.warn { color: #fecaca; }
    /* Disabled options in the time <select> get a softer color so unavailable
       slots read as "you can't pick this" not "I'm broken". */
    .when-input option:disabled { color: var(--muted); }

    /* Modules — used on the Work with us page (and reusable for other multi-section pages) */
    .module {
      background: var(--card-elev);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      margin: 0 0 12px;
      text-align: left;
    }
    .module-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 8px;
    }
    .module p {
      margin: 0 0 12px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink);
    }
    .module p:last-of-type { margin-bottom: 12px; }
    .module .btn { margin-bottom: 0; }
    .module .notify-form { margin: 0; }
    .module .notify-fineprint { margin-top: 0; }
    .support-amounts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0;
    }
    .support-amount {
      min-height: 44px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .support-amount.active {
      border-color: rgba(var(--accent-rgb), 0.55);
      background: rgba(var(--accent-rgb), 0.12);
      color: var(--accent);
    }
    .support-custom {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 8px;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .support-custom input {
      width: 100%;
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--ink);
      padding: 0 12px;
      font: inherit;
    }
    .support-payment {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }
    .support-payment[hidden] { display: none; }
    .coach-card {
      display: grid;
      gap: 14px;
      padding: 16px;
      background: var(--card-elev);
      border: 1px solid var(--line);
      border-radius: 14px;
      text-align: left;
      margin-bottom: 14px;
    }
    .coach-top {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 14px;
      align-items: center;
    }
    .coach-photo {
      width: 78px;
      height: 78px;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(var(--accent-rgb), 0.10);
      border: 1px solid rgba(var(--accent-rgb), 0.24);
      display: grid;
      place-items: center;
      color: var(--accent);
      font-weight: 800;
      font-size: 22px;
    }
    .coach-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .coach-name {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
    }
    .coach-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .coach-pill {
      border: 1px solid rgba(var(--accent-rgb), 0.26);
      background: rgba(var(--accent-rgb), 0.07);
      color: var(--ink);
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 600;
    }
    .coach-bio {
      margin: 0;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.55;
    }
    .coach-focus {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .coach-focus span {
      padding: 9px 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card-elev);
      color: var(--ink);
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .picker {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }
    .pick {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--card-elev);
      border: 1px solid var(--line);
      border-radius: 12px;
      text-decoration: none;
      color: var(--ink);
      font-weight: 500;
      transition: border-color 0.15s, transform 0.05s;
    }
    .pick:hover { border-color: rgba(var(--accent-rgb), 0.40); }
    .pick:active { transform: scale(0.99); }
    .pick.collapsed { display: none; }
    .pick-name { flex: 1; text-align: left; }
    .pick-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .pick-arrow { color: var(--accent); font-size: 18px; }
    .pick.disabled { opacity: 0.55; pointer-events: none; }
    .pick .arrow { color: var(--accent); }
    .pick .tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #b56300;
      background: #fff3e0;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .time-search-actions {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .search-summary {
      margin: 0 0 14px;
      padding: 11px 12px;
      border-radius: 10px;
      background: rgba(var(--accent-rgb), 0.07);
      border: 1px solid rgba(var(--accent-rgb), 0.24);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.45;
      text-align: left;
    }
    .result-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .result-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      background: var(--card-elev);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--ink);
      text-decoration: none;
      transition: border-color 0.15s, transform 0.05s;
    }
    .result-card:hover { border-color: rgba(var(--accent-rgb), 0.45); }
    .result-card:active { transform: scale(0.99); }
    .result-card.disabled {
      opacity: 0.58;
      pointer-events: none;
    }
    .result-main {
      display: grid;
      gap: 4px;
      text-align: left;
    }
    .result-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }
    .result-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }
    .result-status {
      min-width: 86px;
      padding: 7px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .result-status.open {
      border-color: rgba(var(--accent-rgb), 0.45);
      background: rgba(var(--accent-rgb), 0.10);
      color: var(--accent);
    }
    .result-status.full {
      border-color: rgba(248, 113, 113, 0.32);
      background: rgba(248, 113, 113, 0.08);

      text-align: center;
      text-decoration: none;
      cursor: pointer;

    .btn:active { transform: scale(0.98); }
    .btn:disabled {
      cursor: wait;
      opacity: 0.68;
      transform: none;
    }
    .btn-primary {
      background: var(--accent);
      color: #0A0F16;

      background: transparent;
      color: var(--muted);

      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      margin-bottom: 10px;
    }
    .btn-outline:hover { background: rgba(var(--accent-rgb), 0.06); }
    .btn-ghost {
      background: transparent;
      color: var(--accent);

      margin-bottom: 10px;
    }
    .btn-ghost:hover {

<body>
  <!--

    Configure the destination email at:

    const COACHES = [
      {

    // -------------------- Analytics --------------------
    // Plausible is the source of truth once the script tag in <head> is uncommented.
    // localStorage counter remains as a per-browser fallback the in-app dashboard reads.
    // track() is a thin wrapper that no-ops safely if Plausible hasn't loaded.
    function track(event, props) {
      try {
        if (typeof window.plausible === 'function') {
          props ? window.plausible(event, { props }) : window.plausible(event);
        }
      } catch (e) {}
    }

    const TRACK_KEY = 'courtside_clicks_v1';
    function recordClick(id) {
      try {
        const all = JSON.parse(localStorage.getItem(TRACK_KEY) || '{}');
        all[id] = (all[id] || 0) + 1;
        all.__lastClick = Date.now();
        localStorage.setItem(TRACK_KEY, JSON.stringify(all));
      } catch (e) {}
      track('cta_click', { id });
    }
    function getClickCounts() {
      try {
        const all = JSON.parse(localStorage.getItem(TRACK_KEY) || '{}');
        delete all.__lastClick;
        return all;
      } catch (e) { return {}; }
    }

    // Dashboard secret key — intentionally plaintext in HTML.
    // OK here ONLY because the dashboard exposes nothing sensitive (local-only counts).
    // Do NOT reuse this pattern for anything that touches real auth/PII/payments.
    const DASHBOARD_KEY = 'courtside2026';

    // -------------------- Helpers --------------------
    function haversineMiles(lat1, lng1, lat2, lng2) {
      const R = 3958.8;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function nearestCourt(lat, lng) {
      return courtsWithDistances(lat, lng)[0];
    }

    function courtsWithDistances(lat, lng) {
      return COURTS
        .filter(c => c.sports.includes(selectedSport))
        .map(c => ({ ...c, dist: haversineMiles(lat, lng, c.lat, c.lng) }))
        .sort((a, b) => a.dist - b.dist);
    }

    function courtsForSelectedSport() {
      return COURTS
        .filter(c => c.sports.includes(selectedSport))
        .slice()
        .sort((a, b) => a.name.localeCompare(b.name));
    }

    function formatDist(d) {
      if (d < 0.1) return '<0.1 mi';
      if (d < 10)  return `${d.toFixed(1)} mi`;
      return `${Math.round(d)} mi`;
    }

    // Build the compact metadata line for a court — "4 courts · lights · hard".
    // Every field is optional; missing fields produce no markup at all (no broken UI).
    function buildCourtMetaHtml(court) {
      const bits = [];
      if (typeof court.numCourts === 'number' && court.numCourts > 0) {
        bits.push(`${court.numCourts} court${court.numCourts === 1 ? '' : 's'}`);
      }
      if (court.lights) bits.push('lights');
      if (court.surface) bits.push(String(court.surface).toLowerCase());
      if (!bits.length && !court.notes) return '';
      const main = bits.length ? `<div class="court-meta">${bits.join(' · ')}</div>` : '';
      const note = court.notes ? `<div class="court-note">${court.notes}</div>` : '';
      return main + note;
    }

    // Maps directions URL — uses court coordinates only, never the user's location.
    function directionsUrl(court) {
      return `https://www.google.com/maps/dir/?api=1&destination=${court.lat},${court.lng}`;
    }

    // Open-Meteo weather, keyless. Uses the COURT's coords, NOT the user's location.
    // Fails silently — returns '' on any error/timeout. Cached in sessionStorage
    // for 10 min per court so re-renders don't refetch.
    const WEATHER_CACHE_MS = 10 * 60 * 1000;
    function weatherCodeToLabel(code) {
      if (code === 0) return 'clear';
      if ([1, 2].includes(code)) return 'mostly clear';
      if (code === 3) return 'cloudy';
      if ([45, 48].includes(code)) return 'foggy';
      if ([51, 53, 55, 56, 57].includes(code)) return 'drizzle';
      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return 'rain';
      if ([71, 73, 75, 77, 85, 86].includes(code)) return 'snow';
      if ([95, 96, 99].includes(code)) return 'thunderstorm';
      return '';
    }
    async function fetchWeather(court) {
      try {
        const cacheKey = `courtside_weather_${court.id}`;
        const cached = sessionStorage.getItem(cacheKey);
        if (cached) {
          const data = JSON.parse(cached);
          if (Date.now() - data.at < WEATHER_CACHE_MS) return data.line;
        }
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${court.lat}&longitude=${court.lng}&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=auto`;
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 4000);
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) return '';
        const json = await res.json();
        const temp = Math.round(json?.current?.temperature_2m);
        const label = weatherCodeToLabel(json?.current?.weather_code);
        if (!Number.isFinite(temp)) return '';
        const line = label ? `${temp}° · ${label}` : `${temp}°`;
        try { sessionStorage.setItem(cacheKey, JSON.stringify({ line, at: Date.now() })); } catch (e) {}
        return line;
      } catch (e) {
        return ''; // fail silently — weather is a nice-to-have, never a blocker
      }
    }

    // -------------------- Feature 4: remember sport + last court --------------------
    // Persisted across visits via localStorage. New users never see clutter.
    const PREFS_KEY = 'courtside_prefs_v1';
    function loadPrefs() {
      try { return JSON.parse(localStorage.getItem(PREFS_KEY) || '{}') || {}; }
      catch (e) { return {}; }
    }
    function savePrefs(patch) {
      try {
        const cur = loadPrefs();
        localStorage.setItem(PREFS_KEY, JSON.stringify({ ...cur, ...patch }));
      } catch (e) {}
    }
    function rememberSport(sport) {
      if (sport && SPORTS[sport]) savePrefs({ sport });
    }
    function rememberLastCourt(courtId) {
      savePrefs({ lastCourt: courtId, lastCourtAt: Date.now() });
    }

    // -------------------- Feature 6: share --------------------
    // Share payload contains ONLY the public site URL and the court name.
    // Never the user's location, coordinates, or any personal data.
    async function shareSite(court) {
      const url = location.origin + '/';
      const text = court
        ? `Booking a court at ${court.name} — ${url}`
        : `Courtside Reservations — ${url}`;
      track('share_tapped', { court: court ? court.id : null });
      // Native share on mobile (and supported desktop browsers)
      if (navigator.share) {
        try {
          await navigator.share({ title: 'Courtside Reservations', text, url });
          return;
        } catch (e) {
          // User cancelled, or share failed — fall through to clipboard
          if (e && e.name === 'AbortError') return;
        }
      }
      // Clipboard fallback
      try {
        await navigator.clipboard.writeText(text);
        toast('Link copied');
      } catch (e) {
        // Last-resort: prompt() so user can still grab the text
        try { window.prompt('Copy this link:', text); } catch (e2) {}
      }
    }

    // Lightweight transient toast used by Share's clipboard fallback.
    let toastTimer = null;
    function toast(msg) {
      let el = document.getElementById('toast');
      if (!el) {
        el = document.createElement('div');
        el.id = 'toast';
        el.className = 'toast';
        document.body.appendChild(el);
      }
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    // Auto-route only in the explicit "I'm at the court" flow. The normal
    // booking journey is time-first and always shows options instead of jumping
    // to whichever court is geographically nearest.
    const AT_COURT_THRESHOLD_MI   = 0.12;

    // ==================== v3: Booking preferences + Arlington rules ====================
    // User-selected date / time / duration drive Courtside's in-app booking intent.
    //   date     'YYYY-MM-DD'   (native <input type="date">)
    //   time     'HH:MM' 24h    (custom <select>, 30-min slots in operating hours)
    //   duration 60 | 90 mins   (segmented toggle)
    // Arlington publishes these rules: online court reservations are 60 or
    // 90 minutes, at least 24 hours ahead, no more than 14 days ahead.
    const BOOKING_MIN_DAYS_AHEAD = 1;
    const BOOKING_MAX_DAYS_AHEAD = 14;

    const bookingPrefs = { date: null, time: null, duration: 60 };
    const selectedCourtUnits = new Map();

    function formatLocalDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }
    function parseISODate(iso) {
      const [y, mo, d] = iso.split('-').map(Number);
      return new Date(y, mo - 1, d);
    }
    function dateFromISOAndTime(iso, hhmm) {
      const [y, mo, d] = iso.split('-').map(Number);
      const [h, m] = hhmm.split(':').map(Number);
      return new Date(y, mo - 1, d, h, m, 0, 0);
    }
    function minBookingStartDateTime() {
      return new Date(Date.now() + 24 * 60 * 60 * 1000);
    }
    function defaultBookingDateISO() {
      const d = new Date();
      for (let offset = BOOKING_MIN_DAYS_AHEAD; offset <= BOOKING_MAX_DAYS_AHEAD; offset += 1) {
        const candidate = new Date(d);
        candidate.setDate(d.getDate() + offset);
        const iso = formatLocalDate(candidate);
        if (listBookingTimesForDate(bookingPrefs.duration, iso).length) return iso;
      }
      d.setDate(d.getDate() + BOOKING_MIN_DAYS_AHEAD);
      return formatLocalDate(d);
    }
    function minBookingDateISO() {
      const d = new Date();
      d.setDate(d.getDate() + BOOKING_MIN_DAYS_AHEAD);
      return formatLocalDate(d);
    }
    function maxBookingDateISO() {
      const d = new Date();
      d.setDate(d.getDate() + BOOKING_MAX_DAYS_AHEAD);
      return formatLocalDate(d);
    }
    function weekDateOptions() {
      const today = new Date();
      const labels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const out = [];
      for (let offset = BOOKING_MIN_DAYS_AHEAD; offset <= BOOKING_MAX_DAYS_AHEAD; offset += 1) {
        const d = new Date(today);
        d.setDate(today.getDate() + offset);
        const iso = formatLocalDate(d);
        const times = listBookingTimesForDate(bookingPrefs.duration, iso);
        out.push({
          iso,
          disabled: times.length === 0,
          day: offset === 1 ? 'Tomorrow' : labels[d.getDay()],
          date: `${d.getMonth() + 1}/${d.getDate()}`,
        });
      }
      return out;
    }
    function dateChipsHtml() {
      return `
        <div class="date-chip-row" aria-label="Quick dates">
          ${weekDateOptions().map(item => `
            <button type="button" class="date-chip${item.iso === bookingPrefs.date ? ' active' : ''}" data-date="${item.iso}" aria-pressed="${item.iso === bookingPrefs.date}"${item.disabled ? ' disabled' : ''}>
              ${item.day}<span>${item.date}</span>
            </button>
          `).join('')}
        </div>`;
    }
    function syncDateChips() {
      card.querySelectorAll('.date-chip').forEach(btn => {
        const active = btn.dataset.date === bookingPrefs.date;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', String(active));
      });
    }
    // WebTrac/Arlington operating window: bookings 8am–9pm only.
    // Latest valid start time depends on duration: a 60-min booking can start
    // as late as 8:00pm (ends 9:00pm). A 90-min can start at 7:30pm.
    const BOOKING_FIRST_HOUR = 8;   // 08:00 first slot
    const BOOKING_CLOSE_HOUR = 21;  // 21:00 hard close
    const BOOKING_HEADCOUNT = 2;

    function lastBookingStartMins(durationMins) {
      return BOOKING_CLOSE_HOUR * 60 - durationMins;
    }

    function defaultBookingTime24() {
      const date = bookingPrefs.date || defaultBookingDateISO();
      const first = listBookingTimesForDate(bookingPrefs.duration, date)[0];
      return first ? first.value : '08:00';
    }

    function listOperatingTimes(durationMins) {
      const out = [];
      const first = BOOKING_FIRST_HOUR * 60;
      const last  = lastBookingStartMins(durationMins);
      for (let mins = first; mins <= last; mins += 30) {
        const h = Math.floor(mins / 60);
        const m = mins % 60;
        const v = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        const ampm = h >= 12 ? 'PM' : 'AM';
        const h12 = h % 12 === 0 ? 12 : h % 12;
        out.push({ value: v, label: `${h12}:${String(m).padStart(2, '0')} ${ampm}` });
      }
      return out;
    }

    function listBookingTimesForDate(durationMins, dateISO) {
      const minStart = minBookingStartDateTime();
      return listOperatingTimes(durationMins).filter(t =>
        dateFromISOAndTime(dateISO, t.value).getTime() >= minStart.getTime()
      );
    }

    // Returns array of { value: 'HH:MM', label: '8:00 AM' } for every valid
    // start time given the date and booking duration. This enforces both the
    // 9pm close and Arlington's "at least 24 hours ahead" rule.
    function listBookingTimes(durationMins, dateISO = bookingPrefs.date) {
      return listBookingTimesForDate(durationMins, dateISO || defaultBookingDateISO());
    }

    // Format the booking range as "9:30 AM – 10:30 AM" for the live label
    // below the picker so the user always sees exactly what they're booking.
    function formatBookingRange() {
      if (!bookingPrefs.time) return 'Pick a valid time';
      const [h, m] = bookingPrefs.time.split(':').map(Number);
      const startMins = h * 60 + m;
      const endMins = startMins + bookingPrefs.duration;
      const fmt = (mins) => {
        const hr = Math.floor(mins / 60);
        const mn = mins % 60;
        const ampm = hr >= 12 ? 'PM' : 'AM';
        const h12 = hr % 12 === 0 ? 12 : hr % 12;
        return `${h12}:${String(mn).padStart(2, '0')} ${ampm}`;
      };
      return `${fmt(startMins)} – ${fmt(endMins)}`;
    }
    function formatBookingWindow() {
      if (!bookingPrefs.date) return formatBookingRange();
      const d = parseISODate(bookingPrefs.date);
      const day = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][d.getDay()];
      return `${day} ${d.getMonth() + 1}/${d.getDate()} · ${formatBookingRange()}`;
    }
    function initBookingPrefsIfNeeded() {
      if (!bookingPrefs.date) bookingPrefs.date = defaultBookingDateISO();
      if (!bookingPrefs.time) bookingPrefs.time = defaultBookingTime24();
    }

    function isoToWebtracDate(iso) {
      const [y, m, d] = iso.split('-');
      return `${m}/${d}/${y}`;
    }
    function time24toWebtracTime(t) {
      const [h, m] = t.split(':').map(Number);
      const ampm = h >= 12 ? 'pm' : 'am';
      const h12 = h % 12 === 0 ? 12 : h % 12;
      return `${String(h12).padStart(2, '0')}:${String(m).padStart(2, '0')} ${ampm}`;
    }
    function durationToBlocks(duration) {
      return duration === 90 ? '6' : '4';
    }

    function bookingDate() {
      initBookingPrefsIfNeeded();
      return isoToWebtracDate(bookingPrefs.date);
    }
    // Manual fallback URL: always show WebTrac's full 8am-9pm grid. The selected
    // time is not sent as the display begin time, which avoids the Quincy-style
    // "auto-selected random slot" behavior from the earlier experiment.
    const WEBTRAC_DISPLAY_BEGIN_TIME = '08:00 am';
    const WEBTRAC_DISPLAY_BLOCKS     = '26';      // 8am to 9pm in 30-min blocks

    function bookingBeginTime()       { return WEBTRAC_DISPLAY_BEGIN_TIME; }
    function bookingBlocksToDisplay() { return WEBTRAC_DISPLAY_BLOCKS; }

    // -------------------- Availability (live slot data via Netlify Function) --------------------
    // GET /.netlify/functions/availability?court=…&date=MM/DD/YYYY&sport=…
    // Returns aggregate slots plus per-court-unit slots, when WebTrac exposes them.
    // Cached in-memory + sessionStorage, keyed by court|date|sport, for 60s.
    const AVAILABILITY_TTL_MS = 60 * 1000;
    const AVAILABILITY_PARSER_VERSION = 'unit-v2';
    const availabilityMemCache = new Map();

    function availabilityCacheGet(key) {
      const mem = availabilityMemCache.get(key);
      if (mem && Date.now() - mem.at < AVAILABILITY_TTL_MS) {
        return mem.availability || normalizeAvailabilityPayload({ slots: mem.slots });
      }
      try {
        const raw = sessionStorage.getItem('courtside_avail_' + key);
        if (raw) {
          const obj = JSON.parse(raw);
          if (Date.now() - obj.at < AVAILABILITY_TTL_MS) {
            availabilityMemCache.set(key, obj);
            return obj.availability || normalizeAvailabilityPayload({ slots: obj.slots });
          }
        }
      } catch (e) {}
      return null;
    }
    function availabilityCacheSet(key, availability) {
      const entry = { availability: normalizeAvailabilityPayload(availability), at: Date.now() };
      availabilityMemCache.set(key, entry);
      try { sessionStorage.setItem('courtside_avail_' + key, JSON.stringify(entry)); } catch (e) {}
    }

    function normalizeAvailabilityPayload(data) {
      const aggregateSlots = Array.isArray(data)
        ? data
        : (Array.isArray(data && data.slots) ? data.slots : []);
      const courts = Array.isArray(data && data.courts)
        ? data.courts.map((unit, index) => ({
            id: String(unit.id || `court-${index + 1}`),
            label: String(unit.label || `Court ${index + 1}`),
            webtracFacilityId: unit.webtracFacilityId || null,
            slots: Array.isArray(unit.slots) ? unit.slots : [],
          })).filter(unit => unit.slots.length)
        : [];
      return {
        slots: aggregateSlots,
        courts,
        courtCount: Number(data && data.courtCount) || courts.length,
        fetchedAt: data && data.fetchedAt || null,
      };
    }

    async function fetchAvailability(courtCode, sportType) {
      const dateMMDDYYYY = isoToWebtracDate(bookingPrefs.date);
      const key = `${AVAILABILITY_PARSER_VERSION}|${courtCode}|${dateMMDDYYYY}|${sportType}`;
      const cached = availabilityCacheGet(key);
      if (cached) return cached;
      const url = '/.netlify/functions/availability'
        + `?court=${encodeURIComponent(courtCode)}`
        + `&date=${encodeURIComponent(dateMMDDYYYY)}`
        + `&sport=${encodeURIComponent(sportType)}`
        + `&parser=${encodeURIComponent(AVAILABILITY_PARSER_VERSION)}`;
      console.log('[availability] fetching', url);
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 15000);
      try {
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) {
          // Try to extract the function's error body for a better message.
          let bodyText = '';
          try { bodyText = await res.text(); } catch (e) {}
          const err = new Error('HTTP ' + res.status);
          err.status = res.status;
          err.body = bodyText;
          console.warn('[availability] non-OK response', res.status, bodyText);
          throw err;
        }
        const data = await res.json();
        const availability = normalizeAvailabilityPayload(data);
        console.log('[availability] got', availability.slots.length, 'aggregate slots',
                    `(${availability.slots.filter(s=>!s.available).length} taken)`,
                    'court units:', availability.courts.length);
        availabilityCacheSet(key, availability);
        return availability;
      } catch (e) {
        clearTimeout(timer);
        console.warn('[availability] failed:', e && e.message || e, e);
        let message = e && e.message;
        try {
          if (e && e.body) {
            const parsed = JSON.parse(e.body);
            message = parsed.error || parsed.message || message;
          }
        } catch (parseErr) {}
        // Surface the error so refreshAvailability can show a specific message.
        return { __error: true, status: e && e.status, message };
      }
    }

    function bookingSlotKeys(startHHMM, durationMins) {
      const [h, m] = startHHMM.split(':').map(Number);
      const start = h * 60 + m;
      const out = [];
      for (let mins = start; mins < start + durationMins; mins += 30) {
        const hr = Math.floor(mins / 60);
        const mn = mins % 60;
        out.push(`${String(hr).padStart(2, '0')}:${String(mn).padStart(2, '0')}`);
      }
      return out;
    }

    function slotRangeAvailable(slots, requireKnownSlots = true) {
      if (!bookingPrefs.time) return false;
      const lookup = new Map((slots || []).map(s => [s.start, s]));
      return bookingSlotKeys(bookingPrefs.time, bookingPrefs.duration).every(key => {
        const info = lookup.get(key);
        if (!info) return !requireKnownSlots;
        return info.available !== false;
      });
    }

    function availabilitySummaryForSelectedRange(availability, court) {
      if (availability && availability.__error) {
        const configError = /SCRAPER_API_KEY|env var|not configured/i.test(availability.message || '');
        return {
          tone: 'warn',
          label: configError ? 'Setup needed' : 'Check manually',
          detail: configError
            ? 'Live availability is not configured on this deployment.'
            : `Live availability did not load for ${formatBookingWindow()}.`,
          rankBucket: 2,
          openCount: 0,
          totalCount: 0,
          availabilityRatio: 0,
        };
      }

      const normalized = normalizeAvailabilityPayload(availability || {});
      if (normalized.courts.length) {
        const openUnits = normalized.courts.filter(unit => slotRangeAvailable(unit.slots, true));
        if (openUnits.length) {
          const unitNames = openUnits
            .slice(0, 2)
            .map(unit => friendlyCourtUnitLabel(unit.label, court && court.name))
            .join(', ');
          const more = openUnits.length > 2 ? ` +${openUnits.length - 2} more` : '';
          return {
            tone: 'open',
            label: `${openUnits.length}/${normalized.courts.length} open`,
            detail: `${unitNames}${more} at ${formatBookingWindow()}`,
            rankBucket: 0,
            openCount: openUnits.length,
            totalCount: normalized.courts.length,
            availabilityRatio: openUnits.length / normalized.courts.length,
          };
        }
        return {
          tone: 'full',
          label: 'Full',
          detail: `No courts open at ${formatBookingWindow()}`,
          rankBucket: 3,
          openCount: 0,
          totalCount: normalized.courts.length,
          availabilityRatio: 0,
        };
      }

      if (normalized.slots.length) {
        const open = slotRangeAvailable(normalized.slots, true);
        return {
          tone: open ? 'open' : 'full',
          label: open ? 'Open' : 'Full',
          detail: open
            ? `Available at ${formatBookingWindow()}`
            : `Unavailable at ${formatBookingWindow()}`,
          rankBucket: open ? 0 : 3,
          openCount: open ? 1 : 0,
          totalCount: 1,
          availabilityRatio: open ? 1 : 0,
        };
      }

      return {
        tone: 'warn',
        label: 'Manual check',
        detail: `No detailed availability came back for ${formatBookingWindow()}.`,
        rankBucket: 2,
        openCount: 0,
        totalCount: 0,
        availabilityRatio: 0,
      };
    }

    // Apply availability data to the live #prefTime <select>. Disabled options
    // now account for the whole booking duration: a 60-minute booking needs two
    // consecutive 30-minute blocks, and a 90-minute booking needs three.
    // Available options keep WebTrac's AJAX URL as metadata for the future
    // server-side booking adapter, never as a browser navigation target.
    function applyAvailabilityToTimeSelect(slots, statusEl, options = {}) {
      const select = document.getElementById('prefTime');
      if (!select) return;
      const requireKnownSlots = Boolean(options.requireKnownSlots);
      const lookup = new Map((slots || []).map(s => [s.start, s]));
      Array.from(select.options).forEach(opt => {
        const baseLabel = opt.dataset.baseLabel || opt.text.replace(/ — Unavailable$/, '');
        opt.dataset.baseLabel = baseLabel;
        const slotKeys = bookingSlotKeys(opt.value, bookingPrefs.duration);
        const blocked = slotKeys.some(key => {
          const info = lookup.get(key);
          if (!info) return requireKnownSlots;
          return info.available === false;
        });
        const bookingUrls = slotKeys
          .map(key => lookup.get(key) && lookup.get(key).bookingUrl)
          .filter(Boolean);
        if (blocked) {
          opt.disabled = true;
          opt.text = baseLabel + ' — Unavailable';
          delete opt.dataset.bookingUrl;
          delete opt.dataset.bookingUrls;
        } else {
          opt.disabled = false;
          opt.text = baseLabel;
          if (bookingUrls.length) {
            opt.dataset.bookingUrl = bookingUrls[0];
            opt.dataset.bookingUrls = JSON.stringify(bookingUrls);
          } else {
            delete opt.dataset.bookingUrl;
            delete opt.dataset.bookingUrls;
          }
        }
      });
      if (!select.dataset.lockSelectedTime && select.options[select.selectedIndex] && select.options[select.selectedIndex].disabled) {
        const next = Array.from(select.options).find(o => !o.disabled);
        if (next) {
          select.value = next.value;
          bookingPrefs.time = next.value;
        }
      }
      if (statusEl) statusEl.textContent = '';
    }

    function clearAvailabilityFromTimeSelect() {
      const select = document.getElementById('prefTime');
      if (!select) return;
      Array.from(select.options).forEach(opt => {
        opt.disabled = false;
        if (opt.dataset.baseLabel) opt.text = opt.dataset.baseLabel;
        delete opt.dataset.bookingUrl;
        delete opt.dataset.bookingUrls;
      });
    }

    // Look up WebTrac's live AJAX URL for the selected 30-minute start block.
    // v3 sends this only to our backend adapter; navigating to it directly is
    // the known broken path that produces a raw {"status":"invalid"} page.
    function selectedSlotBookingUrl() {
      const select = document.getElementById('prefTime');
      if (!select) return null;
      const opt = select.options[select.selectedIndex];
      return opt && opt.dataset.bookingUrl ? opt.dataset.bookingUrl : null;
    }

    function selectedSlotBookingUrls() {
      const select = document.getElementById('prefTime');
      if (!select) return [];
      const opt = select.options[select.selectedIndex];
      if (!opt) return [];
      if (opt.dataset.bookingUrls) {
        try {
          const urls = JSON.parse(opt.dataset.bookingUrls);
          return Array.isArray(urls) ? urls.filter(Boolean) : [];
        } catch (e) {}
      }
      return opt.dataset.bookingUrl ? [opt.dataset.bookingUrl] : [];
    }

    function selectedTimeIsAvailableInPicker() {
      const select = document.getElementById('prefTime');
      if (!select) return true;
      const opt = select.options[select.selectedIndex];
      return Boolean(opt && !opt.disabled);
    }

    function selectedCourtUnitKey(court) {
      return `${selectedSport}|${court && court.id || 'court'}|${bookingPrefs.date || ''}`;
    }

    function availabilityStartValuesForSlots(slots, requireKnownSlots = false) {
      const lookup = new Map((slots || []).map(s => [s.start, s]));
      return listBookingTimes(bookingPrefs.duration).filter(t =>
        bookingSlotKeys(t.value, bookingPrefs.duration).every(key => {
          const info = lookup.get(key);
          if (!info) return !requireKnownSlots;
          return !info || info.available !== false;
        })
      ).map(t => t.value);
    }

    function courtUnitHasAvailability(unit) {
      return availabilityStartValuesForSlots(unit && unit.slots || [], true).length > 0;
    }

    function courtUnitAvailableForSelectedRange(unit) {
      return slotRangeAvailable(unit && unit.slots || [], true);
    }

    function selectedCourtUnitFor(court, availability) {
      const units = Array.isArray(availability && availability.courts) ? availability.courts : [];
      if (!units.length) return null;
      const key = selectedCourtUnitKey(court);
      const savedId = selectedCourtUnits.get(key);
      let unit = units.find(u => u.id === savedId && courtUnitAvailableForSelectedRange(u));
      if (!unit) unit = units.find(courtUnitAvailableForSelectedRange) || units[0];
      selectedCourtUnits.set(key, unit.id);
      return unit;
    }

    function selectedCourtUnitSlots(court, availability) {
      const unit = selectedCourtUnitFor(court, availability);
      return unit ? unit.slots : (availability && availability.slots || []);
    }

    function selectedCourtUnitPayload(court) {
      const picker = document.getElementById('courtUnitGrid');
      const active = picker && picker.querySelector('.court-unit-btn.active');
      if (!active) return null;
      return {
        id: active.dataset.courtUnitId || null,
        label: active.dataset.courtUnitLabel || active.textContent.trim(),
        displayLabel: active.dataset.courtUnitDisplay || active.textContent.trim(),
        webtracFacilityId: active.dataset.webtracFacilityId || null,
      };
    }

    function friendlyCourtUnitLabel(label, facilityName) {
      let raw = String(label || '').replace(/\s+/g, ' ').trim();
      if (!raw) return 'Court';
      const facility = String(facilityName || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      if (facility) raw = raw.replace(new RegExp(facility, 'ig'), '').trim();
      raw = raw
        .replace(/\bFacility Reservation\b/ig, '')
        .replace(/\bTennis\b/ig, '')
        .replace(/\bPickleball\b/ig, '')
        .replace(/\bVolleyball\b/ig, '')
        .replace(/\s+/g, ' ')
        .trim();
      const courtNumber = raw.match(/\b(?:court|ct)\s*#?\s*([0-9]+[A-Z]?)\b/i)
        || raw.match(/#\s*([0-9]+[A-Z]?)\b/i)
        || raw.match(/\b([0-9]+[A-Z]?)\b$/i);
      return courtNumber ? `Court ${courtNumber[1]}` : (raw || String(label).trim() || 'Court');
    }

    function availabilitySummaryForUnit(unit) {
      if (courtUnitAvailableForSelectedRange(unit)) return 'Available';
      const starts = availabilityStartValuesForSlots(unit && unit.slots || [], true);
      if (!starts.length) return 'Unavailable';
      const first = listOperatingTimes(bookingPrefs.duration).find(t => t.value === starts[0]);
      return first ? `Unavailable · next ${first.label}` : 'Unavailable';
    }

    function renderCourtUnitSelector(court, availability, statusEl, onChange) {
      const wrap = document.getElementById('courtUnitPicker');
      const grid = document.getElementById('courtUnitGrid');
      if (!wrap || !grid) return;
      const units = Array.isArray(availability && availability.courts) ? availability.courts : [];
      if (units.length <= 1) {
        wrap.hidden = true;
        grid.innerHTML = '';
        return;
      }

      wrap.hidden = false;
      const selectedUnit = selectedCourtUnitFor(court, availability);
      grid.innerHTML = units.map((unit) => {
        const active = selectedUnit && unit.id === selectedUnit.id;
        const available = courtUnitAvailableForSelectedRange(unit);
        const display = friendlyCourtUnitLabel(unit.label, court && court.name);
        return `
          <button type="button"
                  class="court-unit-btn${active ? ' active' : ''}${available ? '' : ' unavailable'}"
                  data-court-unit-id="${escapeHtml(unit.id)}"
                  data-court-unit-label="${escapeHtml(unit.label)}"
                  data-court-unit-display="${escapeHtml(display)}"
                  data-webtrac-facility-id="${escapeHtml(unit.webtracFacilityId || '')}"
                  aria-pressed="${active}"
                  aria-disabled="${available ? 'false' : 'true'}"
                  ${available ? '' : 'disabled'}>
            <span class="court-unit-name">${escapeHtml(display)}</span>
            <span class="court-unit-meta">${escapeHtml(availabilitySummaryForUnit(unit))}</span>
          </button>`;
      }).join('');

      grid.querySelectorAll('.court-unit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.disabled) return;
          selectedCourtUnits.set(selectedCourtUnitKey(court), btn.dataset.courtUnitId);
          grid.querySelectorAll('.court-unit-btn').forEach(other => {
            const active = other === btn;
            other.classList.toggle('active', active);
            other.setAttribute('aria-pressed', String(active));
          });
          const unit = units.find(u => u.id === btn.dataset.courtUnitId);
          applyAvailabilityToTimeSelect(
            unit ? unit.slots : availability.slots,
            statusEl,
            { requireKnownSlots: Boolean(unit) }
          );
          if (onChange) onChange();
        });
      });
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function refreshAvailability(court, statusEl, onUnitChange) {
      if (!court || !court.code || court.code === 'TBD') return;
      const sportType = SPORTS[selectedSport].type;
      const reserveBtn = document.getElementById('reserveBtn');
      if (reserveBtn && !reserveBtn.hidden) {
        reserveBtn.disabled = true;
        reserveBtn.textContent = 'Checking courts...';
      }
      if (statusEl) statusEl.textContent = 'Checking availability…';
      const result = await fetchAvailability(court.code, sportType);
      if (result && result.__error) {
        // Specific error message so you know WHY it failed in DevTools.
        clearAvailabilityFromTimeSelect();
        if (reserveBtn && !reserveBtn.hidden) {
          reserveBtn.disabled = false;
          reserveBtn.textContent = 'Continue to booking';
        }
        if (statusEl) {
          const hint = result.status === 404 ? 'function not deployed'
                     : result.status === 500 ? 'env var likely missing'
                     : result.status === 502 ? 'scraper rejected'
                     : 'check console';
          statusEl.textContent = `Couldn't load availability (${result.status || 'network'}) — ${hint}`;
        }
        return;
      }
      const availability = normalizeAvailabilityPayload(result);
      renderCourtUnitSelector(court, availability, statusEl, onUnitChange);
      const beforeTime = bookingPrefs.time;
      applyAvailabilityToTimeSelect(
        selectedCourtUnitSlots(court, availability),
        statusEl,
        { requireKnownSlots: availability.courts.length > 1 }
      );
      if (bookingPrefs.time !== beforeTime && onUnitChange) onUnitChange();
      const canBookSelectedTime = selectedTimeIsAvailableInPicker();
      if (reserveBtn && !reserveBtn.hidden) {
        reserveBtn.disabled = !canBookSelectedTime;
        reserveBtn.textContent = canBookSelectedTime ? 'Continue to booking' : 'Unavailable at this time';
      }
      if (statusEl && availability.courts.length > 1) {
        const unit = selectedCourtUnitFor(court, availability);
        statusEl.textContent = canBookSelectedTime
          ? `Choose an available court for ${formatBookingWindow()}.`
          : `No ${court.name} courts are available for ${formatBookingWindow()}.`;
      }
    }

    function startBookingProgressMessages(el) {
      if (!el) return { stop() {} };

      let index = 0;
      let timer = null;
      const showNext = () => {
        setReserveStatus(el, BOOKING_PROGRESS_MESSAGES[index], '');
        index = Math.min(index + 1, BOOKING_PROGRESS_MESSAGES.length - 1);
        timer = window.setTimeout(showNext, 2600);

      showNext();
      return {

    let stripeScriptPromise = null;
    let activeSupportPayment = null;

    function formatUsd(cents) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
      }).format((Number(cents) || 0) / 100);
    }

    function loadStripeScript() {
      if (window.Stripe) return Promise.resolve();
      if (stripeScriptPromise) return stripeScriptPromise;
      stripeScriptPromise = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://js.stripe.com/v3/';
        script.async = true;
        script.onload = resolve;
        script.onerror = () => reject(new Error('Stripe.js could not load.'));
        document.head.appendChild(script);
      });
      return stripeScriptPromise;
    }

    function setPaymentStatus(el, message, tone) {
      if (!el) return;
      el.textContent = message || '';
      el.classList.toggle('ok', tone === 'ok');

    function supportAmountCents() {
      const customEl = document.getElementById('supportCustomAmount');
      const activePreset = document.querySelector('.support-amount.active');
      const hasCustomValue = Boolean(customEl && customEl.value.trim());
      const customValue = Number(customEl?.value || 0);
      if (hasCustomValue && Number.isFinite(customValue)) {
        return Math.round(customValue * 100);
      }
      return Number(activePreset?.dataset.amount || 500);
    }

    function updateSupportAmountLabel() {
      const amountCents = supportAmountCents();
      const startBtn = document.getElementById('supportStartBtn');
      const payBtn = document.getElementById('supportPayBtn');
      if (startBtn) startBtn.textContent = `Continue with ${formatUsd(amountCents)}`;
      if (payBtn) payBtn.textContent = `Pay ${formatUsd(amountCents)}`;
      return amountCents;
    }

    async function prepareSupportPayment(amountCents) {
      const panelEl = document.getElementById('supportPaymentPanel');
      const elementEl = document.getElementById('supportPaymentElement');
      const statusEl = document.getElementById('supportPaymentStatus');
      const payBtn = document.getElementById('supportPayBtn');
      const startBtn = document.getElementById('supportStartBtn');
      if (!panelEl || !elementEl || !payBtn) return;

      panelEl.hidden = false;
      elementEl.innerHTML = '';
      elementEl.hidden = true;
      activeSupportPayment = null;
      payBtn.disabled = true;
      payBtn.hidden = true;
      if (startBtn) startBtn.disabled = true;
      setPaymentStatus(statusEl, 'Preparing secure payment...', '');

      try {
        const [configRes] = await Promise.all([
          fetch('/.netlify/functions/stripe-config', { headers: { 'Cache-Control': 'no-store' } }),
          loadStripeScript(),
        ]);
        const config = await configRes.json().catch(() => ({}));
        if (!configRes.ok || !config.publishableKey) {
          setPaymentStatus(statusEl, config.message || 'Stripe is not configured yet.', 'warn');
          return;
        }

        const intentRes = await fetch('/.netlify/functions/create-payment-intent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amountCents,
            purpose: 'support',
            captureMethod: 'automatic',
          }),
        });
        const intent = await intentRes.json().catch(() => ({}));
        if (!intentRes.ok || !intent.clientSecret) {
          setPaymentStatus(statusEl, intent.message || 'Could not start payment.', 'warn');
          return;
        }

        const stripe = window.Stripe(config.publishableKey);
        const elements = stripe.elements({ clientSecret: intent.clientSecret });
        const paymentElement = elements.create('payment', {
          layout: { type: 'accordion', defaultCollapsed: false },
        });
        elementEl.hidden = false;
        paymentElement.mount(elementEl);
        activeSupportPayment = { stripe, elements, amountCents };
        payBtn.hidden = false;
        payBtn.disabled = false;
        payBtn.onclick = () => confirmSupportPayment(payBtn, statusEl);
        setPaymentStatus(statusEl, 'Secure payment is ready.', '');
      } catch (e) {
        setPaymentStatus(statusEl, e.message || 'Could not prepare payment.', 'warn');
      } finally {
        if (startBtn) startBtn.disabled = false;
      }
    }

    async function confirmSupportPayment(payBtn, statusEl) {
      if (!activeSupportPayment) return;
      payBtn.disabled = true;
      payBtn.textContent = 'Paying...';
      setPaymentStatus(statusEl, 'Opening secure payment...', '');

      const { stripe, elements, amountCents } = activeSupportPayment;
      const { error, paymentIntent } = await stripe.confirmPayment({
        elements,
        confirmParams: { return_url: location.href },
        redirect: 'if_required',
      });

      if (error) {
        payBtn.disabled = false;
        payBtn.textContent = `Pay ${formatUsd(amountCents)}`;
        setPaymentStatus(statusEl, error.message || 'Payment was not completed.', 'warn');
        return;
      }

      payBtn.textContent = 'Thank you';
      setPaymentStatus(statusEl, `Thanks for supporting Courtside. Payment ${paymentIntent?.status || 'completed'}.`, 'ok');
      track('support_payment_completed', { amountCents });
    }

    function wireSupportPaymentModule() {
      const startBtn = document.getElementById('supportStartBtn');
      const customEl = document.getElementById('supportCustomAmount');
      const panelEl = document.getElementById('supportPaymentPanel');
      const statusEl = document.getElementById('supportPaymentStatus');
      if (!startBtn) return;

      const resetPayment = () => {
        activeSupportPayment = null;
        if (panelEl) panelEl.hidden = true;
        const elementEl = document.getElementById('supportPaymentElement');
        const payBtn = document.getElementById('supportPayBtn');
        if (elementEl) {
          elementEl.hidden = true;
          elementEl.innerHTML = '';
        }
        if (payBtn) {
          payBtn.hidden = true;
          payBtn.disabled = true;
        }
        setPaymentStatus(statusEl, '', '');
      };

      document.querySelectorAll('.support-amount').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.support-amount').forEach(item => item.classList.toggle('active', item === btn));
          if (customEl) customEl.value = '';
          updateSupportAmountLabel();
          resetPayment();
        });
      });

      if (customEl) {
        customEl.addEventListener('input', () => {
          document.querySelectorAll('.support-amount').forEach(item => item.classList.remove('active'));
          updateSupportAmountLabel();
          resetPayment();
        });
      }

      updateSupportAmountLabel();
      startBtn.addEventListener('click', () => {
        const amountCents = updateSupportAmountLabel();
        if (!Number.isInteger(amountCents) || amountCents < 100) {
          setPaymentStatus(statusEl, 'Please enter at least $1.', 'warn');
          return;
        }
        if (amountCents > 50000) {
          setPaymentStatus(statusEl, 'Please enter $500 or less.', 'warn');
          return;
        }
        track('support_payment_started', { amountCents });
        prepareSupportPayment(amountCents);
      });
    }

    function renderQrDisplay() {
      // QR encodes the bare URL — both scanning and typing land users on the same flow.
      const scanUrl = location.href.split('?')[0].split('#')[0];

      let qrMarkup;
      // Guard against the qrcode global being missing entirely (e.g., the inline
      // script body failed to execute). Without this check, the call would throw
      // ReferenceError and the QR view would render blank.
      if (typeof qrcode !== 'function') {
        qrMarkup = `
          <div class="error" style="text-align: center;">
            <strong>QR unavailable.</strong><br>
            Share this link directly:<br>
            <code style="word-break: break-all;">${scanUrl}</code>
          </div>`;
      } else {
        try {
          const qr = qrcode(0, 'M');  // auto type, medium error correction
          qr.addData(scanUrl);
          qr.make();
          qrMarkup = qr.createSvgTag({ cellSize: 8, margin: 0, scalable: true });
        } catch (e) {
          qrMarkup = `
            <div class="error" style="text-align: center;">
              <strong>QR unavailable.</strong><br>
              ${e.message}<br>
              Share this link directly:<br>

      // Repeat users get a shortcut back to their recent court, then choose a
      // valid Arlington booking window before continuing.
      let recentHtml = '';
      const RECENT_MAX_AGE_MS = 30 * 24 * 60 * 60 * 1000;
      if (prefs.lastCourt && prefs.lastCourtAt && (Date.now() - prefs.lastCourtAt) < RECENT_MAX_AGE_MS) {
        const recentCourt = COURTS.find(c => c.id === prefs.lastCourt);
        const recentSport = (prefs.sport && SPORTS[prefs.sport]) ? prefs.sport : 'tennis';
        if (recentCourt && recentCourt.code && recentCourt.code !== 'TBD'
            && recentCourt.sports.includes(recentSport)) {
          recentHtml = `

               data-court-id="${recentCourt.id}" data-sport="${recentSport}">

              </span>
              <span class="recent-arrow">→</span>

      const sportOrder = Object.keys(SPORTS);

    function wireStandaloneTimePicker(onChange) {
      const dateEl = document.getElementById('prefDate');
      const timeEl = document.getElementById('prefTime');
      const rangeEl = document.getElementById('bookingRange');
      const updateRange = () => {
        if (rangeEl) rangeEl.textContent = formatBookingWindow();
        if (onChange) onChange();
      };
      const rebuildTimeDropdown = () => {
        if (!timeEl) return;
        const current = bookingPrefs.time;
        const times = listBookingTimes(bookingPrefs.duration);
        if (!times.length) {
          timeEl.innerHTML = '<option value="">No valid times</option>';
          timeEl.disabled = true;
          bookingPrefs.time = '';
          updateRange();
          return;
        }
        timeEl.disabled = false;
        timeEl.innerHTML = times.map(t =>
          `<option value="${t.value}">${t.label}</option>`
        ).join('');
        const stillValid = times.find(t => t.value === current);
        const next = stillValid || times[0];
        timeEl.value = next.value;
        bookingPrefs.time = next.value;
        updateRange();
      };

      if (dateEl) dateEl.addEventListener('change', () => {
        if (!dateEl.value) return;
        bookingPrefs.date = dateEl.value;
        syncDateChips();
        rebuildTimeDropdown();
      });
      card.querySelectorAll('.date-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          bookingPrefs.date = btn.dataset.date;
          if (dateEl) dateEl.value = bookingPrefs.date;
          syncDateChips();
          rebuildTimeDropdown();
        });
      });
      if (timeEl) timeEl.addEventListener('change', () => {
        if (!timeEl.value) return;
        bookingPrefs.time = timeEl.value;
        updateRange();
      });
      card.querySelectorAll('.duration-toggle .seg').forEach(seg => {
        seg.addEventListener('click', () => {
          bookingPrefs.duration = parseInt(seg.dataset.duration, 10);
          card.querySelectorAll('.duration-toggle .seg').forEach(s => {
            const active = s === seg;
            s.classList.toggle('active', active);
            s.setAttribute('aria-checked', String(active));
          });
          rebuildTimeDropdown();
        });
      });
    }

    function requestLocation() {
      renderLocating();
      if (!('geolocation' in navigator)) {
        renderFallback('Your browser does not support geolocation.');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        pos => {
          track('location_granted', { sport: selectedSport });
          const userLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          const sorted = courtsWithDistances(userLoc.lat, userLoc.lng);
          const court = sorted[0];
          if (!court || !court.code || court.code === 'TBD') {
            renderCourtSearchResults(
              userLoc,
              court
                ? `The closest court (${court.name}) isn't configured yet — ` +
                  `its WebTrac location code needs to be filled in.`
                : `No courts configured for this sport yet.`
            );
            return;
          }
          if (court.dist <= AT_COURT_THRESHOLD_MI) {
            renderPostBooking(court, userLoc);
          } else {
            const dist = formatDist(court.dist);
            renderCourtSearchResults(
              userLoc,
              `You do not appear to be right at a court. The nearest match is ${court.name} (${dist}), so here are available options for ${formatBookingWindow()}.`
            );
          }
        },
        err => {
          track('location_denied', { code: err.code, sport: selectedSport });
          if (err.code === 1) {
            renderDeniedHelp();
          } else {
            const msg =
              err.code === 2 ? "Couldn't determine your location." :
              err.code === 3 ? 'Location request timed out.' :
              'Could not get your location.';
            renderTimeFirstSearch(msg);
          }
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    }

    const CONTACT_EMAIL = 'support@courtsidereservations.com';

    // Email validation — intentionally simple (RFC-perfect regex is overkill).
    // Rejects empty / no @ / no dot-after-@ / spaces.
    function isValidEmail(s) {
      if (!s || typeof s !== 'string') return false;
      const t = s.trim();
      if (t.length < 5 || t.length > 254 || /\s/.test(t)) return false;
      const at = t.indexOf('@');
      if (at < 1 || at !== t.lastIndexOf('@')) return false;
      const dom = t.slice(at + 1);
      return dom.includes('.') && !dom.startsWith('.') && !dom.endsWith('.');
    }

    /**
     * Reusable email-capture component.

     *   purpose:     one-sentence explanation of what the email is used for (shown above the field).

    function wireNotifyForm() {
      const form = document.getElementById('notifyForm');
      if (!form) return;
      const input = document.getElementById('notifyEmail');
      const errEl = document.getElementById('notifyError');
      const success = document.getElementById('notifySuccess');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = (input.value || '').trim();
        if (!isValidEmail(email)) {
          errEl.textContent = 'Enter a valid email address.';
          input.focus();
          return;
        }
        errEl.textContent = '';
        const waitlist = form.dataset.waitlist || '(general)';

        // TODO: POST { email, waitlist, ts: Date.now() } to the real submission
        // endpoint when one exists (e.g. Netlify Forms, Formspree, a Worker, etc.).
        // Until then we just record the event and show success.
        // Example shape when ready:
        //   fetch('/api/waitlist', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        //                            body: JSON.stringify({ email, waitlist }) })
        //     .catch(() => {}); // fail silently — track() already fired
        track('waitlist_signup', { waitlist });

        form.hidden = true;
        success.hidden = false;
      });
      // Clear error on edit
      input.addEventListener('input', () => { errEl.textContent = ''; });
