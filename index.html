      `;
      resetViewScroll();

      document.getElementById('homeBtn').addEventListener('click', () => { location.href = location.pathname; });

      const form = document.getElementById('contactForm');
      const emailEl = document.getElementById('cEmail');
      const msgEl = document.getElementById('cMessage');
      const errEl = document.getElementById('contactError');
      const successEl = document.getElementById('contactSuccess');
      const submitBtn = document.getElementById('contactSubmit');

      const clearErr = () => { errEl.textContent = ''; };
      emailEl.addEventListener('input', clearErr);
      msgEl.addEventListener('input', clearErr);

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = (emailEl.value || '').trim();
        const message = (msgEl.value || '').trim();
        if (!isValidEmail(email)) {
          errEl.textContent = 'Enter a valid email address.';
          emailEl.focus();
          return;
        }
        if (message.length < 4) {
          errEl.textContent = 'Tell us a little more.';
          msgEl.focus();
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending…';

        // Netlify Forms: POST application/x-www-form-urlencoded to "/".
        // form-name must be included; Netlify routes to the matching form schema
        // declared in the static HTML at the top of <body>.
        // 15s timeout so the button never stays stuck on "Sending…" if Netlify
        // never responds (form not detected, network drop, etc.).
        const data = new URLSearchParams(new FormData(form)).toString();
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);

        fetch('/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: data,
          signal: controller.signal,
        }).then((res) => {
          clearTimeout(timeout);
          console.log('[contact form] response:', res.status, res.statusText);
          if (!res.ok) throw new Error('Submit failed: ' + res.status);
          track('contact_sent', {});
          form.hidden = true;
          successEl.hidden = false;
        }).catch((err) => {
          clearTimeout(timeout);
          console.error('[contact form] fetch error:', err);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send';
          const msg = (err && err.name === 'AbortError')
            ? 'Request timed out. Check that Netlify Forms is enabled, or email us at ' + CONTACT_EMAIL + '.'
            : "Couldn't send right now. Try again, or email us at " + CONTACT_EMAIL + '.';
          errEl.textContent = msg;
        });
      });

      wireBackLink();
    }

    let courtSearchRunId = 0;
    const RESULT_COLLAPSED_LIMIT = 5;

    function initialResultSummaryForCourt(court) {
      const disabled = !court.code || court.code === 'TBD';
      if (disabled) {
        return {
          tone: 'warn',
          label: 'Setup',
          detail: 'WebTrac setup needed',
          rankBucket: 4,
          openCount: 0,
          totalCount: court.numCourts || 0,
          availabilityRatio: 0,
        };
      }
      return {
        tone: 'checking',
        label: 'Checking',
        detail: `Checking ${formatBookingWindow()}`,
        rankBucket: 1,
        openCount: 0,
        totalCount: court.numCourts || 0,
        availabilityRatio: 0,
      };
    }

    function resultMetaText(court, summary, nearby) {
      const distance = nearby && typeof court.dist === 'number' ? `${formatDist(court.dist)} away` : '';
      return [distance, summary.detail].filter(Boolean).join(' · ');
    }

    function availabilityRankBucket(summary) {
      if (Number.isFinite(summary && summary.rankBucket)) return summary.rankBucket;
      if (summary && summary.tone === 'open') return 0;
      if (summary && summary.tone === 'warn') return 2;
      if (summary && summary.tone === 'full') return 3;
      return 1;
    }

    function compareResultStates(a, b, nearby) {
      const bucketDelta = availabilityRankBucket(a.summary) - availabilityRankBucket(b.summary);
      if (bucketDelta) return bucketDelta;

      if (nearby) {
        const distA = typeof a.court.dist === 'number' ? a.court.dist : Number.POSITIVE_INFINITY;
        const distB = typeof b.court.dist === 'number' ? b.court.dist : Number.POSITIVE_INFINITY;
        const distanceDelta = distA - distB;
        if (Math.abs(distanceDelta) > 0.001) return distanceDelta;
      }

      const ratioDelta = (b.summary.availabilityRatio || 0) - (a.summary.availabilityRatio || 0);
      if (Math.abs(ratioDelta) > 0.001) return ratioDelta;

      const openDelta = (b.summary.openCount || 0) - (a.summary.openCount || 0);
      if (openDelta) return openDelta;

      return a.court.name.localeCompare(b.court.name) || a.index - b.index;
    }

    function rerankResultCards(resultStates, nearby) {
      const list = card.querySelector('.result-list');
      if (!list || !resultStates) return;
      const orderedStates = Array.from(resultStates.values())
        .sort((a, b) => compareResultStates(a, b, nearby));

      orderedStates.forEach((state, index) => {
        const node = list.querySelector(`[data-result-court-id="${state.court.id}"]`);
        if (!node) return;
        node.hidden = !resultStates.expanded && index >= RESULT_COLLAPSED_LIMIT;
        list.appendChild(node);
      });

      const showMoreBtn = document.getElementById('showMoreResultsBtn');
      if (!showMoreBtn) return;
      const hiddenCount = Math.max(0, orderedStates.length - RESULT_COLLAPSED_LIMIT);
      showMoreBtn.hidden = resultStates.expanded || hiddenCount === 0;
      showMoreBtn.textContent = `Show ${hiddenCount} more courts`;
    }

    function resultCardHtml(court, nearby, summary = initialResultSummaryForCourt(court)) {
      const disabled = !court.code || court.code === 'TBD';
      const meta = resultMetaText(court, summary, nearby);
      return `
        <a class="result-card${disabled ? ' disabled' : ''}" href="#" data-result-court-id="${court.id}">
          <span class="result-main">
            <span class="result-name">${escapeHtml(court.name)}</span>
            <span class="result-meta" data-result-meta="${court.id}">${escapeHtml(meta)}</span>
          </span>
          <span class="result-status ${summary.tone || ''}" data-result-status="${court.id}">
            ${escapeHtml(summary.label)}
          </span>
        </a>`;
    }

    function updateResultCard(court, summary, nearby, resultStates) {
      const statusEl = card.querySelector(`[data-result-status="${court.id}"]`);
      const metaEl = card.querySelector(`[data-result-meta="${court.id}"]`);
      if (!statusEl || !metaEl) return;
      statusEl.className = `result-status ${summary.tone || ''}`.trim();
      statusEl.textContent = summary.label;
      metaEl.textContent = resultMetaText(court, summary, nearby);
      if (resultStates && resultStates.has(court.id)) {
        resultStates.get(court.id).summary = summary;
        rerankResultCards(resultStates, nearby);
      }
    }

    async function loadCourtSearchAvailability(courts, nearby, runId, resultStates) {
      const queue = courts.filter(c => c.code && c.code !== 'TBD');
      let next = 0;
      const worker = async () => {
        while (next < queue.length) {
          const court = queue[next++];
          const availability = await fetchAvailability(court.code, SPORTS[selectedSport].type);
          if (runId !== courtSearchRunId) return;
          updateResultCard(court, availabilitySummaryForSelectedRange(availability, court), nearby, resultStates);
        }
      };
      await Promise.all([worker(), worker(), worker()]);
    }

    function renderCourtSearchResults(userLoc, errMsg) {
      initBookingPrefsIfNeeded();
      const sport = SPORTS[selectedSport];
      const nearby = userLoc != null;
      const courts = nearby
        ? courtsWithDistances(userLoc.lat, userLoc.lng)
        : courtsForSelectedSport();
      const resultStates = new Map(courts.map((court, index) => [
        court.id,
        {
          court,
          index,
          summary: initialResultSummaryForCourt(court),
        },
      ]));
      resultStates.expanded = courts.length <= RESULT_COLLAPSED_LIMIT;
      const title = nearby
        ? `${sport.label} near you`
        : `${sport.label} courts`;
      const summary = nearby
        ? `Ranking available courts first, then nearest options for ${formatBookingWindow()}.`
        : `Ranking available ${sport.label.toLowerCase()} courts first for ${formatBookingWindow()}.`;

      const runId = ++courtSearchRunId;
      card.innerHTML = `
        ${backLinkHtml()}
        ${sportIconSvg(selectedSport, false)}
        <h1>${title}</h1>
        <div class="search-summary">${summary}</div>
        ${errMsg ? `<div class="error">${errMsg}</div>` : ''}

          ${courts.map(c => resultCardHtml(c, nearby, resultStates.get(c.id).summary)).join('')}

        <button class="btn btn-secondary show-more-results" id="showMoreResultsBtn" type="button" hidden>Show more courts</button>

      `;
      resetViewScroll();

      card.querySelectorAll('a[data-result-court-id]').forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          const courtId = a.dataset.resultCourtId;
          const court = courts.find(c => c.id === courtId);
          if (!court || !court.code || court.code === 'TBD') return;

      document.getElementById('showMoreResultsBtn')?.addEventListener('click', () => {
        resultStates.expanded = true;
        rerankResultCards(resultStates, nearby);
        track('court_results_expanded', {
          sport: selectedSport,
          source: nearby ? 'nearby-availability' : 'all-availability',
        });
      });
      document.getElementById('changeTimeBtn')?.addEventListener('click', () => renderTimeFirstSearch());
      document.getElementById('manualAllBtn')?.addEventListener('click', () => {
        track('manual_webtrac_all_opened', { sport: selectedSport });
      });
      wireBackLink();
      rerankResultCards(resultStates, nearby);
      loadCourtSearchAvailability(courts, nearby, runId, resultStates);
    }

    function renderFallback(errMsg, userLoc) {
      renderCourtSearchResults(userLoc || null, errMsg);
    }

    // -------------------- Main --------------------
    function continueToLocation() {
      if (navigator.permissions && navigator.permissions.query) {
        navigator.permissions.query({ name: 'geolocation' }).then(
          result => {
            if (result.state === 'granted') requestLocation();
            else if (result.state === 'denied') renderDeniedHelp();
            else renderPermissionPrompt();
          },
          () => renderPermissionPrompt()
        );
      } else {
        renderPermissionPrompt();
      }
    }

    // Routing:
    //   /            → sport picker (start of flow) — what people see when scanning QR or typing the URL
    //   /?qr=1       → QR display (for grabbing/printing the QR)
    //   /?go=1       → sport picker (legacy support for old printed QR codes)
    const params = new URLSearchParams(location.search);

    function showInitialView() {
      const view = params.get('view');
      if (params.has('qr'))           return renderQrDisplay();
      if (view === 'dashboard')       return renderDashboard();
      if (view === 'coaches')         return renderCoaches();
      if (view === 'contact')         return renderContact();
      if (view === 'work-with-us')    return renderWorkWithUs();
      if (view === 'coming-soon') {
        // The Work with us page has its own multi-module layout.
        if (params.get('cat') === 'work-with-us') return renderWorkWithUs();
        return renderComingSoon();
      }
      if (view === 'post-booking') {
        // Testing affordance: ?view=post-booking&sport=tennis&court=quincy
        // renders the full court result screen (weather, directions, share, rules).
        // Without &court=, falls back to the "Got your slot?" return-from-WebTrac view.
        const courtId = params.get('court');
        const c = courtId && COURTS.find(x => x.id === courtId);
        return renderPostBooking(c ? { ...c, dist: 0 } : null);
      }

      // Default route: check if user just came back from WebTrac → show post-booking
      const last = sessionStorage.getItem('lastBooking');
      if (last) {
        try {
          const data = JSON.parse(last);
          if (Date.now() - data.when < 30 * 60 * 1000) {
            selectedSport = data.sport || 'tennis';
            track('returned_from_webtrac', { sport: selectedSport });
            return renderPostBooking();
          } else {
            sessionStorage.removeItem('lastBooking');
          }
        } catch (e) {}
      }
      renderSportPicker();
    }

    // Inject icons into footer links (HTML can't access JS ICONS map directly).
    document.querySelectorAll('.app-footer a[data-icon]').forEach(a => {
      const iconName = a.dataset.icon;
      const label = a.textContent;
      if (ICONS[iconName]) {
        a.innerHTML = ICONS[iconName] + '<span>' + label + '</span>';
      }
    });

    showInitialView();

    // Delegated click tracker — fires for any element with data-cta-id (e.g., footer links).
    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-cta-id]');
      if (el) recordClick(el.dataset.ctaId);
    });

    // Delegated share handler — drop a `data-action="share"` attribute on any
    // anchor or button anywhere in the app and it'll trigger the native share
    // sheet (with clipboard fallback). Never includes user location.
    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-action="share"]');
      if (el) {
        e.preventDefault();
        shareSite(null);
      }
    });

    // When the user hits browser back from WebTrac, the page may be restored
    // from the back/forward cache. Re-route so they see the post-booking screen
    // (or sport picker if no recent booking).
    window.addEventListener('pageshow', (event) => {
      if (event.persisted && !params.has('qr')) {
        showInitialView();
      }
    });

    // -------------------- Service worker (PWA) --------------------
    // Caches the app shell so the site loads instantly + survives flaky connections.
    // Feature-detected; fails silently if unsupported (file://, old browsers, etc.).
    // WebTrac, weather, and analytics are NOT cached — they always hit the network.
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {
          // Silent — SW is a progressive enhancement, never required for the app to work.
        });
      });
    }
  </script>
</body>
</html>
